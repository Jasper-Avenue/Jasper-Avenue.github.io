      return mainActivities.map(main => {
        const childrenData = main.children.map(child => ({

        }));

          key: `main-${main.id}`,
          _isChild: false,
          id: main.id,
          name: main.name,
          city: main.city,
          periodLabel: `共${main.children.length}期`,
          timeRange: `${main.cycleStart} ~ ${main.cycleEnd}`,
          status: main.status,
          users: main.totalUsers,
          winners: main.totalWinners,

    function App() {
      const [collapsed, setCollapsed] = useState(false);
      const [dataSource, setDataSource] = useState(generateMockData());
      const [expandedRowKeys, setExpandedRowKeys] = useState([]);
      const [messageApi, contextHolder] = message.useMessage();

      const [filterName, setFilterName] = useState('');
      const [filterCity, setFilterCity] = useState(undefined);
      const [filterStatus, setFilterStatus] = useState('进行中');
      const [filterDateRange, setFilterDateRange] = useState(null);
      const [filterActivityDate, setFilterActivityDate] = useState(null);

      const [currentPage, setCurrentPage] = useState(1);
      const [pageSize, setPageSize] = useState(20);

      const allCities = useMemo(() => [...new Set(dataSource.map(d => d.city))], []);


      const filteredData = useMemo(() => {
        let data = dataSource.map(d => ({ ...d }));
        if (filterName.trim()) {
          const kw = filterName.trim().toLowerCase();
          data = data.filter(d => !d._isChild && d.name.toLowerCase().includes(kw));
        }
        if (filterCity) {
          data = data.filter(d => !d._isChild && d.city === filterCity);
        }
        if (filterStatus) {
          data = data.filter(d => !d._isChild && d.status === filterStatus);
        }
        if (filterActivityDate && filterActivityDate[0] && filterActivityDate[1]) {
          const fStart = filterActivityDate[0].format('YYYY-MM-DD');
          const fEnd = filterActivityDate[1].format('YYYY-MM-DD');
          data = data.filter(d => !d._isChild && d.cycleStart <= fEnd && d.cycleEnd >= fStart);
        }
        if (filterDateRange && filterDateRange[0] && filterDateRange[1]) {
          const start = filterDateRange[0].format('YYYY-MM-DD');
          const end = filterDateRange[1].format('YYYY-MM-DD');
          data = data.filter(d => !d._isChild && d.createdAt.slice(0, 10) >= start && d.createdAt.slice(0, 10) <= end);
        }
        data.sort((a, b) => dayjs(b.createdAt).valueOf() - dayjs(a.createdAt).valueOf());
        data.forEach(d => {
          if (d.children) {
            d.children.sort((a, b) => a.period - b.period);
          }
        });
        return data;
      }, [dataSource, filterName, filterCity, filterStatus, filterActivityDate, filterDateRange]);

      const paginatedData = useMemo(() => {
        const start = (currentPage - 1) * pageSize;
        return filteredData.slice(start, start + pageSize);
      }, [filteredData, currentPage, pageSize]);

      const handleQuery = () => {
        setCurrentPage(1);
        messageApi.success('查询完成');
      };

      const handleReset = () => {
        setFilterName('');
        setFilterCity(undefined);
        setFilterStatus('进行中');
        setFilterActivityDate(null);
        setFilterDateRange(null);
        setCurrentPage(1);
      };

      const handleClose = (record) => {
        setDataSource(prev => prev.map(d => {
          if (d.key === record.key) {
            const updated = { ...d, status: '已关闭', _prevStatus: d.status };
            if (updated.children) {
              updated.children = updated.children.map(c => ({ ...c, status: '已关闭', _prevStatus: c.status }));
            }
            return updated;
          }
          return d;
        }));
        messageApi.success(`活动「${record.name}」已关闭`);
      };

      const handleRestore = (record) => {
        setDataSource(prev => prev.map(d => {
          if (d.key === record.key) {
            const updated = { ...d, status: d._prevStatus || record.status };
            delete updated._prevStatus;
            if (updated.children) {
              updated.children = updated.children.map(c => {
                const restored = { ...c, status: c._prevStatus || c.status };
                delete restored._prevStatus;
                return restored;
              });
            }
            return updated;
          }
          return d;
        }));
        messageApi.success(`活动「${record.name}」已恢复`);
      };

      const columns = [
        {
          title: '序号',
          key: 'index',
          width: 56,
          align: 'center',
          render: (_, record, index) => {
            if (record._isChild) return '';
            return (currentPage - 1) * pageSize + index + 1;
          },
        },
        {
          title: '活动名称',
          dataIndex: 'name',
          width: 200,
          ellipsis: { showTitle: false },
          render: (text, record) => {
            if (record._isChild) return null;
            const display = text.length > 12 ? text.slice(0, 12) + '...' : text;
            return (
              <Tooltip title={text}>
                <span className="parent-row" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 200 }}>
                  {display}
                </span>
              </Tooltip>
            );
          },
        },
        {
          title: '期数',
          dataIndex: 'periodLabel',
          width: 80,
          align: 'center',
          render: (text, record) => {
            const statusClsMap = {
              '待开始': 'period-tag-waiting',
              '进行中': 'period-tag-active',
              '已结束': 'period-tag-ended',
              '已关闭': 'period-tag-closed',
            };
            const cls = `period-tag ${statusClsMap[record.status] || 'period-tag-ended'}`;
            return <span className={cls}>{text}</span>;
          },
        },
        {
          title: '活动时间',
          dataIndex: 'timeRange',
          width: 200,
          align: 'center',
        },
        {
          title: '活动状态',
          dataIndex: 'status',
          width: 90,
          align: 'center',
          render: (status) => <StatusTag status={status} />,
        },
        {
          title: '参与用户数',
          dataIndex: 'users',
          width: 100,
          align: 'center',
          render: (val) => <span className="cell-number">{val ?? 0}</span>,
        },
        {
          title: '获奖用户数',
          dataIndex: 'winners',
          width: 100,
          align: 'center',
          render: (val) => <span className="cell-number">{val ?? 0}</span>,
        },
        {
          title: '创建时间',
          dataIndex: 'createdAt',
          width: 160,
          align: 'center',
          render: (text, record) => {
            if (record._isChild) return null;
            return text || '--';
          },
        },
        {
          title: '操作',
          key: 'action',
          width: 200,
          fixed: 'right',
          align: 'center',
          render: (_, record) => {
            if (record._isChild) return null;
            const { status } = record;
            const canView = ['进行中', '已结束', '已关闭'].includes(status);
            const canEdit = status === '待开始';
            const canClose = ['待开始', '进行中'].includes(status);
            const canRestore = status === '已关闭';
            return (
              <Space size="small">
                {canView && <Button type="link" size="small" className="action-btn" onClick={() => window.location.href = `activity-detail.html?id=${record.id}`}>查看</Button>}
                {canEdit && <Button type="link" size="small" className="action-btn" onClick={() => window.location.href = `activity-form.html?mode=edit&id=${record.id}`}>编辑</Button>}
                {canClose && (
                  <Popconfirm title="确认关闭" description={`确定要关闭活动「${record.name}」吗？关闭后所有子活动将联动关闭。`} onConfirm={() => handleClose(record)} okText="确认关闭" cancelText="取消">
                    <Button type="link" size="small" danger className="action-btn">关闭</Button>
                  </Popconfirm>
                )}
                {canRestore && (
                  <Popconfirm title="确认恢复" description={`确定要恢复活动「${record.name}」吗？恢复后将根据当前时间自动判定活动状态。`} onConfirm={() => handleRestore(record)} okText="确认恢复" cancelText="取消">
                    <Button type="link" size="small" className="action-btn text-success">恢复</Button>
                  </Popconfirm>
                )}
              </Space>
            );
          },
        },
      ];

      return (
        <Layout style={{ minHeight: '100vh' }}>
          {contextHolder}
          <Sider width={200} collapsedWidth={56} theme="dark" collapsible collapsed={collapsed} trigger={null} style={{ overflow: 'auto', height: '100vh', position: 'sticky', top: 0, left: 0 }}>
            <div className="sidebar-logo" style={{ justifyContent: collapsed ? 'center' : 'flex-start' }}>
              <div className="sidebar-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" width="16" height="16">
                  <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
              </div>
              {!collapsed && <span className="sidebar-logo-text">喜行约车</span>}
            </div>
            <Menu theme="dark" mode="inline" defaultSelectedKeys={['activity-mgmt']} defaultOpenKeys={['helper', 'free-card']} inlineCollapsed={collapsed} items={menuItems} style={{ borderInlineEnd: 0 }} />
          </Sider>
          <Layout>
            <Header className="header-bar">
              <div className="header-left">
                <Button type="text" onClick={() => setCollapsed(!collapsed)} className="header-collapse-btn" aria-label={collapsed ? '展开侧边栏' : '收起侧边栏'}>
                  {collapsed ? <I d="M9 18l6-6-6-6" size={18} /> : <I d="M4 6h16M4 12h16M4 18h16" size={18} />}
                </Button>
                <Breadcrumb items={[{ title: '喜行小助手' }, { title: '免佣卡商城' }, { title: '活动管理' }]} />
              </div>
              <div className="header-avatar">管</div>
            </Header>
            <Content className="content-area">
              <div className="filter-panel">
                <div className="filter-row">
                  <div className="filter-item">
                    <span className="filter-label">活动名称</span>
                    <Input placeholder="请输入活动名称" value={filterName} onChange={(e) => setFilterName(e.target.value)} allowClear style={{ width: 180 }} />
                  </div>
                  <div className="filter-item">
                    <span className="filter-label">活动城市</span>
                    <Select placeholder="全部" value={filterCity} onChange={(v) => setFilterCity(v)} allowClear showSearch style={{ width: 140 }} options={allCities.map(c => ({ label: c, value: c }))} />
                  </div>
                  <div className="filter-item">
                    <span className="filter-label">主活动状态</span>
                    <Select value={filterStatus} onChange={(v) => setFilterStatus(v ?? '')} allowClear style={{ width: 140 }} options={[{ label: '全部', value: '' }, { label: '待开始', value: '待开始' }, { label: '进行中', value: '进行中' }, { label: '已结束', value: '已结束' }, { label: '已关闭', value: '已关闭' }]} />
                  </div>
                  <div className="filter-item">
                    <span className="filter-label">活动时间</span>
                    <RangePicker value={filterActivityDate} onChange={(dates) => setFilterActivityDate(dates)} placeholder={['Start date', 'End date']} style={{ width: 240 }} />
                  </div>
                  <div className="filter-item">
                    <span className="filter-label">创建时间</span>
                    <RangePicker value={filterDateRange} onChange={(dates) => setFilterDateRange(dates)} placeholder={['Start date', 'End date']} style={{ width: 240 }} />
                  </div>
                  <Space>
                    <Button type="primary" onClick={handleQuery}>查询</Button>
                    <Button onClick={handleReset}>重置</Button>
                  </Space>
                </div>
              </div>
              <div className="table-container">
                <div className="table-header">
                  <Button type="primary" icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" width="14" height="14"><path d="M12 5v14M5 12h14" /></svg>} onClick={() => window.location.href = 'activity-form.html?mode=create'}>新建活动</Button>
                  <div style={{ flex: 1 }} />
                </div>
                <div style={{ padding: 16 }}>
                  <Table className="tree-table" columns={columns} dataSource={paginatedData} rowKey="key" pagination={false} scroll={{ x: 1200 }} expandable={{ expandedRowKeys, onExpandedRowsChange: (keys) => setExpandedRowKeys([...keys]), expandRowByClick: false, indentSize: 24 }} locale={{ emptyText: '暂无活动数据' }} />
                  <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 16 }}>
                    <Pagination current={currentPage} pageSize={pageSize} total={filteredData.length} showSizeChanger showQuickJumper pageSizeOptions={['10', '20', '50']} showTotal={(total) => `共 ${total} 条`} onChange={(page, size) => { setCurrentPage(page); if (size !== pageSize) setPageSize(size); }} onShowSizeChange={(page, size) => { setCurrentPage(1); setPageSize(size); }} />
                  </div>
                </div>
              </div>
            </Content>
          </Layout>
        </Layout>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
