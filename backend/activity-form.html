    // ===== WangEditor Wrapper =====
    function RichEditor({ value = '', onChange, placeholder = '请输入内容...' }) {
      const containerRef = useRef(null);
      const editorInstanceRef = useRef(null);
      const toolbarInstanceRef = useRef(null);
      const initializedRef = useRef(false);
      const onChangeRef = useRef(onChange);
      const blockOnChangeRef = useRef(true);
      onChangeRef.current = onChange;

      useEffect(() => {
        if (!containerRef.current || editorInstanceRef.current) return;
        const toolbarDiv = document.createElement('div');
        const editorDiv = document.createElement('div');
        containerRef.current.appendChild(toolbarDiv);
        containerRef.current.appendChild(editorDiv);
        const editor = createEditor({
          selector: editorDiv, html: value || '',
          config: {
            placeholder,
            onChange(ed) { if (blockOnChangeRef.current) return; onChangeRef.current?.(ed.getHtml()); },
          },
          mode: 'simple',
        });
        const toolbar = createToolbar({ selector: toolbarDiv, editor, config: {}, mode: 'simple' });
        editorInstanceRef.current = editor;
        toolbarInstanceRef.current = toolbar;
        initializedRef.current = true;
        const timer = setTimeout(() => { blockOnChangeRef.current = false; }, 100);
        return () => { clearTimeout(timer); editor.destroy(); editorInstanceRef.current = null; toolbarInstanceRef.current = null; initializedRef.current = false; };
      }, []);

      useEffect(() => {
        if (!initializedRef.current || !editorInstanceRef.current) return;
        if (value === undefined || value === null) return;
        const currentHtml = editorInstanceRef.current.getHtml();
        if (currentHtml !== value) editorInstanceRef.current.setHtml(value);
      }, [value]);

      return <div className="rich-editor-wrap" ref={containerRef} />;
    }

    // ===== RichEditor for Ant Form =====

      const [innerValue, setInnerValue] = useState(value || '');

    // ===== Poster Upload Component (in-page modal preview) =====
    function PosterUpload({ value, onChange, label }) {
      const [fileList, setFileList] = useState([]);
      const [previewVisible, setPreviewVisible] = useState(false);
      const [previewUrl, setPreviewUrl] = useState('');

      useEffect(() => {
        if (value) {

        }
      }, [value]);

      const getBase64 = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = (error) => reject(error);
      });

      const handleChange = ({ fileList: newFileList }) => {
        setFileList(newFileList);
        if (newFileList.length > 0 && newFileList[0].originFileObj) {
          getBase64(newFileList[0].originFileObj).then(url => onChange?.(url));
        } else if (newFileList.length === 0) {
          onChange?.('');
        }
      };

      const handlePreview = (file) => {
        setPreviewUrl(file.url || file.thumbUrl);
        setPreviewVisible(true);
      };

      const uploadButton = (
        <div style={{ padding: '20px 0' }}>

          </svg>
          <div style={{ fontSize: 13, color: '#595959' }}>{label}</div>
        </div>
      );

      return (
        <>

            listType="picture-card"
            fileList={fileList}
            onChange={handleChange}
            onPreview={handlePreview}
            maxCount={1}
            accept="image/*"
            className="poster-upload"

            footer={null}

        '深圳': [{ value: '1天免佣卡', label: '1天免佣卡' }],
        '杭州': [{ value: '1天免佣卡', label: '1天免佣卡' }, { value: '7天免佣卡', label: '7天免佣卡' }],
        '成都': [{ value: '1天免佣卡', label: '1天免佣卡' }],
        '武汉': [{ value: '1天免佣卡', label: '1天免佣卡' }, { value: '3天免佣卡', label: '3天免佣卡' }],
      };

      // Current city for product dropdown enablement
      const watchedCity = Form.useWatch('city', form);
      const selectedCity = watchedCity || (isEditMode && editData ? editData.city : null);
      const cityProductOptions = selectedCity ? (CITY_PRODUCTS[selectedCity] || []) : [];

      // Refs for tracking original values and changed fields (edit mode)
      const originalValuesRef = useRef(null);
      const changedFieldsRef = useRef(new Set());
      const originalPeriodsRef = useRef(null);
      const periodsChangedRef = useRef(false);

      // Period state
      const [periods, setPeriods] = useState(
        isEditMode && editData.periods
          ? editData.periods.map(p => ({ ...p, id: Date.now() + p.period }))
          : [{ period: 1, start: null, end: null, purchaseLimit: null, product: '', id: Date.now() }]
      );
      const [periodsChanged, setPeriodsChanged] = useState(!isEditMode);

      // Track whether city has been manually changed (not just initial load)
      const cityInitializedRef = useRef(false);

      // Reward tiers state
      const [tiers, setTiers] = useState(
        isEditMode && editData.tiers
          ? editData.tiers.map((t, i) => ({ ...t, id: Date.now() + i }))
          : [{ threshold: '', reward: '', maxWinners: '', id: Date.now() }]
      );

      // Track form changes
      const handleValuesChange = useCallback((changed, all) => {
        setHasChanges(true);
        // Track changed fields
        Object.keys(changed).forEach(key => changedFieldsRef.current.add(key));
        // City change: clear all period products
        // But skip on initial load — only react to actual user changes
        if (changed.city && cityInitializedRef.current) {
          setPeriods(prev => prev.map(pp => ({ ...pp, product: '' })));
        }
      }, []);

      // Save original values on mount (edit mode only)
      useEffect(() => {
        if (isEditMode && editData) {
          originalValuesRef.current = {
            name: editData.name,
            city: editData.city,
            cycleTime: [editData.cycleStart, editData.cycleEnd],
            upgrade: editData.upgrade,
            upgradeMode: editData.upgradeMode || 'all',
          };
          originalPeriodsRef.current = editData.periods.map(p => ({ start: p.start, end: p.end, purchaseLimit: p.purchaseLimit, product: p.product }));
        }
        // Mark city as initialized after initial render
        cityInitializedRef.current = true;
      }, []);

      // Auto-correct last period end when cycleTime changes
      const watchedCycleTime = Form.useWatch('cycleTime', form);
      useEffect(() => {
        if (watchedCycleTime && watchedCycleTime[1] && periods.length > 0) {
          const cycleEndStr = watchedCycleTime[1].format('YYYY-MM-DD');
          const lastPeriod = periods[periods.length - 1];
          if (lastPeriod.end !== cycleEndStr) {
            setPeriods(prev => prev.map(pp => pp.id === lastPeriod.id ? { ...pp, end: cycleEndStr } : pp));
          }
        }
      }, [watchedCycleTime]);

      // Leave protection
      const handleBack = useCallback(() => {
        if (hasChanges) {
          setPendingNav('back');
          setLeaveModalOpen(true);
        } else {
          window.location.href = 'activity-list.html';
        }
      }, [hasChanges]);

      const confirmLeave = useCallback(() => {
        setLeaveModalOpen(false);
        setHasChanges(false);
        if (pendingNav === 'back') {
          window.location.href = 'activity-list.html';
        }
      }, [pendingNav]);

      const cancelLeave = useCallback(() => {
        setLeaveModalOpen(false);
        setPendingNav(null);
      }, []);

      // Beforeunload handler
      useEffect(() => {
        const handler = (e) => {
          if (hasChanges) {
            e.preventDefault();
            e.returnValue = '';
          }
        };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [hasChanges]);

      // Period error state
      const [periodErrors, setPeriodErrors] = useState({});

      // Period operations
      const addPeriod = () => {
        const newPeriod = periods.length + 1;
        setPeriods([...periods, { period: newPeriod, start: null, end: null, purchaseLimit: null, product: '', id: Date.now() + newPeriod }]);
        setPeriodsChanged(true);
        setPeriodErrors({});
      };

      const deletePeriod = (id) => {
        const filtered = periods.filter(p => p.id !== id);
        setPeriods(filtered.map((p, i) => ({ ...p, period: i + 1 })));
        setPeriodsChanged(true);
        setPeriodErrors({});
      };

      const updatePeriod = (id, field, val) => {
        setPeriods(periods.map(p => p.id === id ? { ...p, [field]: val } : p));
        setPeriodsChanged(true);
        // Clear error for this field on change
        setPeriodErrors(prev => {
          const next = { ...prev };
          delete next[`${id}_${field}`];
          return next;
        });
      };

      // Tier error state
      const [tierErrors, setTierErrors] = useState({});

      // Auto-sort tiers by threshold descending (empty values go to bottom)
      const sortTiers = (list) => {
        return [...list].sort((a, b) => {
          const aVal = Number(a.threshold) || 0;
          const bVal = Number(b.threshold) || 0;
          if (a.threshold && !b.threshold) return -1;
          if (!a.threshold && b.threshold) return 1;
          return bVal - aVal;
        });
      };

      // Tier operations
      const addTier = () => {
        const newTier = { threshold: '', reward: '', maxWinners: '', id: Date.now() + Math.random() };
        setTiers(sortTiers([...tiers, newTier]));
        setTierErrors({});
      };

      const deleteTier = (id) => {
        if (tiers.length <= 1) return;
        setTiers(sortTiers(tiers.filter(t => t.id !== id)));
        setTierErrors({});
      };

      const updateTier = (id, field, val) => {
        const updated = tiers.map(t => t.id === id ? { ...t, [field]: val } : t);
        // When threshold changes, auto-reorder
        setTiers(field === 'threshold' ? sortTiers(updated) : updated);
        // Clear error for this field on change
        setTierErrors(prev => {
          const next = { ...prev };
          delete next[`${id}_${field}`];
          return next;
        });
      };

      // Validation
      const validateForm = (formValues) => {
        const errors = [];
        const isCycleTimeChanged = isEditMode && originalValuesRef.current
          ? (changedFieldsRef.current.has('cycleTime') || !originalValuesRef.current.cycleTime)
          : true;
        const isPeriodsChanged = isEditMode && originalPeriodsRef.current
          ? periodsChanged
          : true;

        // Check periods
        if (periods.length === 0) errors.push('至少需要添加一期');
        const newPeriodErrors = {};
        periods.forEach((p, i) => {
          if (!p.start) {
            errors.push(`第${p.period}期：请选择开始时间`);
            newPeriodErrors[`${p.id}_start`] = 'error';
          }
          if (!p.end) {
            errors.push(`第${p.period}期：请选择结束时间`);
            newPeriodErrors[`${p.id}_end`] = 'error';
          }
          if (!p.purchaseLimit || p.purchaseLimit <= 0) {
            errors.push(`第${p.period}期：资格购买上限必须为正整数`);
            newPeriodErrors[`${p.id}_purchaseLimit`] = 'error';
          }
          if (selectedCity && !p.product) {
            errors.push(`第${p.period}期：请选择推广商品`);
            newPeriodErrors[`${p.id}_product`] = 'error';
          }
        });
        setPeriodErrors(newPeriodErrors);

        // Time conflict checks (only if cycleTime or periods changed in edit mode)
        if (isCycleTimeChanged || isPeriodsChanged) {
          // Cycle time must start after today
          if (formValues.cycleTime && formValues.cycleTime[0]) {
            const cycleStart = formValues.cycleTime[0];
            const today = dayjs().startOf('day');
            if (cycleStart.isBefore(today) || cycleStart.isSame(today, 'day')) {
              errors.push('活动开始时间必须晚于今天');
            }
          }

          // Cycle time: end must be after start
          if (formValues.cycleTime && formValues.cycleTime[0] && formValues.cycleTime[1]) {
            if (formValues.cycleTime[1].isBefore(formValues.cycleTime[0])) {
              errors.push('活动结束时间必须晚于开始时间');
            }
          }

          // Period overlap check
          for (let i = 0; i < periods.length; i++) {
            for (let j = i + 1; j < periods.length; j++) {
              if (periods[i].start && periods[i].end && periods[j].start && periods[j].end) {
                const aStart = dayjs(periods[i].start);
                const aEnd = dayjs(periods[i].end);
                const bStart = dayjs(periods[j].start);
                const bEnd = dayjs(periods[j].end);
                if (aStart.isBefore(bEnd) && bStart.isBefore(aEnd)) {
                  errors.push(`第${periods[i].period}期与第${periods[j].period}期时间重叠`);
                }
              }
            }
          }
        }

        // Check tiers
        if (tiers.length === 0) errors.push('至少需要配置 1 档奖励阶梯');
        const newTierErrors = {};
        tiers.forEach((t, i) => {
          if (!t.threshold || t.threshold <= 0) {
            errors.push(`奖励阶梯第${i + 1}行：转化人数门槛必须为正整数`);
            newTierErrors[`${t.id}_threshold`] = 'error';
          }
          if (!t.reward || !t.reward.trim()) {
            errors.push(`奖励阶梯第${i + 1}行：请输入奖励内容`);
            newTierErrors[`${t.id}_reward`] = 'error';
          }
          // Only validate maxWinners for first tier
          if (i === 0 && (!t.maxWinners || t.maxWinners <= 0)) {
            errors.push(`奖励阶梯第${i + 1}行：可获奖人数必须为正整数`);
            newTierErrors[`${t.id}_maxWinners`] = 'error';
          }
        });
        setTierErrors(newTierErrors);

        // Tier threshold descending check
        const thresholds = tiers.map(t => Number(t.threshold)).filter(n => !isNaN(n));
        for (let i = 1; i < thresholds.length; i++) {
          if (thresholds[i] >= thresholds[i - 1]) {
            errors.push(`奖励阶梯：转化人数门槛必须降序排列（第${i + 1}行 >= 第${i}行）`);
            break;
          }
        }

        // Upgrade value must be positive integer
        if (!formValues.upgrade || formValues.upgrade <= 0) {
          errors.push('门槛升值必须为正整数');
        }

        // Last period end must equal cycle end
        if (periods.length > 0 && formValues.cycleTime && formValues.cycleTime[1]) {
          const cycleEnd = formValues.cycleTime[1].format('YYYY-MM-DD');
          const lastPeriod = periods[periods.length - 1];
          if (lastPeriod.end && lastPeriod.end !== cycleEnd) {
            errors.push(`最后一期（第${lastPeriod.period}期）结束时间必须等于大周期结束时间（${cycleEnd}）`);
            newPeriodErrors[`${lastPeriod.id}_end`] = 'error';
            setPeriodErrors(newPeriodErrors);
          }
        }

        return errors;
      };

      // Save
      const handleSave = async () => {
        try {
          const values = await form.validateFields();

          const errors = validateForm(values);
          if (errors.length > 0) {
            messageApi.error(errors[0]);
            return;
          }

          // Build summary at save time — all fields are validated, no empty data
          const cycleRange = values.cycleTime && values.cycleTime[0] && values.cycleTime[1]
            ? `${values.cycleTime[0].format('YYYY-MM-DD')} 至 ${values.cycleTime[1].format('YYYY-MM-DD')}`
            : '--';
          const rulesText = (values.rules || '').replace(/<[^>]+>/g, '').trim();
          const rulesPreview = rulesText ? (rulesText.length > 50 ? rulesText.substring(0, 50) + '...' : rulesText) : '--';
          const filledTiers = tiers.filter(t => t.threshold);
          const tierDetails = filledTiers.map((t, i) => ({
            threshold: t.threshold,
            reward: t.reward,
            maxWinners: t.maxWinners,
            isPrimary: i === 0,
          }));
          setSaveSummary({
            name: values.name,
            city: values.city,
            cycle: cycleRange,
            rules: rulesPreview,
            upgrade: `${values.upgradeMode === 'all' ? '所有阶梯' : '最高阶梯'} +${values.upgrade}人`,
            tierCount: tierDetails.length,
            tierDetails,
            periodCount: periods.length,
            periods: periods.map(p => ({
              period: p.period,
              start: p.start,
              end: p.end,
              purchaseLimit: p.purchaseLimit,
              product: p.product,
            })),
          });

          setSaveModalOpen(true);
        } catch (err) {
          // Form validation failed, Ant Design handles inline errors
        }
      };

      const confirmSave = () => {
        setSaveModalOpen(false);
        setSaveLoading(true);
        setTimeout(() => {
          setSaveLoading(false);
          setHasChanges(false);
          messageApi.success('保存成功');
          setTimeout(() => {
            window.location.href = 'activity-list.html';
          }, 800);
        }, 600);
      };

      // Render
      return (
        <Layout style={{ minHeight: '100vh' }}>
          {contextHolder}
          <Sider width={200} collapsedWidth={56} theme="dark" collapsible collapsed={collapsed} trigger={null} style={{ overflow: 'auto', height: '100vh', position: 'sticky', top: 0, left: 0 }}>
            <div className="sidebar-logo" style={{ justifyContent: collapsed ? 'center' : 'flex-start' }}>
              <div className="sidebar-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" width="16" height="16">
                  <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
              </div>
              {!collapsed && <span className="sidebar-logo-text">喜行约车</span>}
            </div>
            <Menu theme="dark" mode="inline" defaultSelectedKeys={['activity-mgmt']} defaultOpenKeys={['helper', 'free-card']} inlineCollapsed={collapsed} items={menuItems} style={{ borderInlineEnd: 0 }} />
          </Sider>
          <Layout>
            <Header className="header-bar">
              <div className="header-left">
                <Button type="text" onClick={() => setCollapsed(!collapsed)} className="header-collapse-btn" aria-label={collapsed ? '展开侧边栏' : '收起侧边栏'}>
                  {collapsed ? <I d="M9 18l6-6-6-6" size={18} /> : <I d="M4 6h16M4 12h16M4 18h16" size={18} />}
                </Button>
                <Breadcrumb items={[
                  { title: '喜行小助手' },
                  { title: '免佣卡商城' },
                  { title: <a href="activity-list.html" style={{ color: '#595959' }}>活动管理</a> },
                  { title: pageTitle },
                ]} />
              </div>
              <div className="header-avatar">管</div>
            </Header>
            <Content className="form-page">
              {/* Page Title Row (no background, in grey area) */}
              <div className="page-title-row">
                <Button type="text" onClick={handleBack} className="page-back-btn" icon={<I d="M15 18l-6-6 6-6" size={20} />} />
                <span className="page-title-text">{pageTitle}</span>
              </div>

              <div className="white-board">
                <Form
                  form={form}
                  layout="vertical"
                  onValuesChange={handleValuesChange}
                  initialValues={isEditMode ? {
                    name: editData.name,
                    city: editData.city,
                    cycleTime: [dayjs(editData.cycleStart), dayjs(editData.cycleEnd)],
                    rules: editData.rules,
                    upgrade: editData.upgrade,
                    upgradeMode: editData.upgradeMode || 'all',
                    bannerPoster: editData.bannerPoster,
                    popupPoster: editData.popupPoster,
                    sharePoster: editData.sharePoster,
                    activityPoster: editData.activityPoster,
                    successPoster: editData.successPoster,
                    sharePoster2: editData.sharePoster,
                  } : {}}
                >
                  {/* Section 1: Basic Info */}
                  <div className="section-title">基本信息</div>
                  <div className="form-area">
                    <Form.Item label="活动名称" name="name" rules={[{ required: true, message: '请输入活动名称' }, { max: 15, message: '活动名称不能超过 15 个字符' }]}>
                      <Input placeholder="请输入活动名称" maxLength={15} showCount />
                    </Form.Item>
                    <Form.Item label="活动规则" name="rules" rules={[{ required: true, message: '请输入活动规则' }]}>
                      <RichEditorFormItem />
                    </Form.Item>
                    <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                      <Form.Item style={{ flex: '1 1 45%' }} label="Banner图" name="bannerPoster" rules={[{ required: true, message: '请上传Banner图' }]}>
                        <PosterUpload label="点击上传Banner图" />
                      </Form.Item>
                      <Form.Item style={{ flex: '1 1 45%' }} label="活动弹窗宣传海报" name="popupPoster" rules={[{ required: true, message: '请上传活动弹窗宣传海报' }]}>
                        <PosterUpload label="点击上传弹窗海报" />
                      </Form.Item>
                    </div>
                  </div>

                  {/* ===== 区块二：主活动配置 ===== */}
                  <hr className="section-divider" />
                  <div className="section-title">主活动配置</div>
                  <div className="form-area" style={{ paddingTop: 16 }}>
                    {/* 活动城市 */}
                    <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                      <Form.Item style={{ flex: '1 1 45%' }} label="活动城市" name="city" rules={[{ required: true, message: '请选择活动城市' }]}>
                        <Select
                          placeholder="请选择活动城市"
                          options={[
                            { value: '北京', label: '北京' },
                            { value: '上海', label: '上海' },
                            { value: '广州', label: '广州' },
                            { value: '深圳', label: '深圳' },
                            { value: '杭州', label: '杭州' },
                            { value: '成都', label: '成都' },
                            { value: '武汉', label: '武汉' },
                          ]}
                        />
                      </Form.Item>
                    </div>
                    {/* 奖励阶梯 */}
                    <Form.Item label="奖励阶梯" required style={{ marginBottom: 4 }}>
                      <div style={{ fontSize: 12, color: '#8c8c8c', marginBottom: 8 }}>至少配置 1 档，按转化人数降序排列。达成最上面一档默认返还本金。</div>
                      <Table
                        className="reward-table"
                        size="small"
                        pagination={false}
                        showHeader={true}
                        columns={[
                          {
                            title: '转化人数门槛',
                            key: 'threshold',
                            width: 160,
                            render: (_, record, index) => (
                              <div>
                                <InputNumber
                                  value={record.threshold}
                                  onChange={(v) => updateTier(record.id, 'threshold', v)}
                                  placeholder="正整数"
                                  min={1}
                                  precision={0}
                                  className={tierErrors[`${record.id}_threshold`] ? 'input-error' : ''}
                                  style={{ width: '100%' }}
                                />
                                {tierErrors[`${record.id}_threshold`] && <div className="tier-error-msg">请输入正整数</div>}
                              </div>
                            ),
                          },
                          {
                            title: '奖励内容',
                            key: 'reward',
                            render: (_, record, index) => (
                              <div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                                  <Input
                                    value={record.reward}
                                    onChange={(e) => updateTier(record.id, 'reward', e.target.value)}
                                    placeholder="限 15 字符"
                                    maxLength={15}
                                    className={tierErrors[`${record.id}_reward`] ? 'input-error' : ''}
                                  />
                                  {index === 0 && <Tag color="blue" className="primary-tier-tag">返还本金</Tag>}
                                </div>
                                {tierErrors[`${record.id}_reward`] && <div className="tier-error-msg">请输入奖励内容</div>}
                              </div>
                            ),
                          },
                          {
                            title: '可获奖人数最大值',
                            key: 'maxWinners',
                            width: 160,
                            render: (_, record, index) => (
                              index === 0 ? (
                                <div>
                                  <InputNumber
                                    value={record.maxWinners}
                                    onChange={(v) => updateTier(record.id, 'maxWinners', v)}
                                    placeholder="正整数"
                                    min={1}
                                    precision={0}
                                    className={tierErrors[`${record.id}_maxWinners`] ? 'input-error' : ''}
                                    style={{ width: '100%' }}
                                  />
                                  {tierErrors[`${record.id}_maxWinners`] && <div className="tier-error-msg">请输入正整数</div>}
                                </div>
                              ) : <span style={{ color: '#8c8c8c' }}>无限制</span>
                            ),
                          },
                          {
                            title: '操作',
                            key: 'action',
                            width: 60,
                            align: 'center',
                            render: (_, record) => (
                              tiers.length > 1 ? (
                                <Button type="link" danger size="small" onClick={() => deleteTier(record.id)} style={{ padding: '0 4px' }}>
                                  <I d="M18 6L6 18M6 6l12 12" size={14} />
                                </Button>
                              ) : null
                            ),
                          },
                        ]}
                        dataSource={tiers}
                        rowKey="id"
                      />
                      <Button type="dashed" onClick={addTier} block style={{ marginTop: 8, width: 200 }}>
                        <I d="M12 5v14M5 12h14" size={14} /> 添加阶梯
                      </Button>
                    </Form.Item>

                    {/* 门槛升值 */}
                    <Form.Item label="门槛升值" required>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
                          <span style={{ color: '#8c8c8c', minWidth: 110, flexShrink: 0 }}>选择升值模式</span>
                          <Form.Item name="upgradeMode" noStyle rules={[{ required: true, message: '请选择升值模式' }]} initialValue="all">
                            <Radio.Group options={[
                              { label: '所有阶梯', value: 'all' },
                              { label: '最高阶梯', value: 'highest' },
                            ]} />
                          </Form.Item>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 24 }}>
                          <span style={{ color: '#8c8c8c', minWidth: 110, flexShrink: 0, lineHeight: '32px' }}>设置升值人数</span>
                          <div style={{ flex: 1 }}>
                            <Form.Item name="upgrade" noStyle rules={[{ required: true, message: '请输入门槛升值数' }]}>
                              <InputNumber placeholder="正整数" min={1} precision={0} style={{ width: 200 }} addonAfter="人" />
                            </Form.Item>
                            <div style={{ fontSize: 12, color: '#8c8c8c', marginTop: 4 }}>
                              用户获奖后，下期该阶梯个人门槛 = 原门槛 + 升级值 x 该用户已获奖次数
                            </div>
                          </div>
                        </div>
                      </div>
                    </Form.Item>
                    {/* 活动详情页海报 + 支付成功页海报 + 分享海报 */}
                    <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                      <div style={{ flex: '1 1 25%' }}>
                        <Form.Item label="活动详情页-活动海报" name="activityPoster" rules={[{ required: true, message: '请上传活动海报' }]}>
                          <PosterUpload label="点击上传活动海报" />
                        </Form.Item>
                        <div style={{ fontSize: 12, color: '#8c8c8c', marginTop: -8 }}>移动端活动详情页用户看到的图片</div>
                      </div>
                      <div style={{ flex: '1 1 25%' }}>
                        <Form.Item label="支付成功页-宣传海报" name="successPoster" rules={[{ required: true, message: '请上传支付成功页海报' }]}>
                          <PosterUpload label="点击上传支付成功页海报" />
                        </Form.Item>
                        <div style={{ fontSize: 12, color: '#8c8c8c', marginTop: -8 }}>移动端支付成功页用户看到的图片</div>
                      </div>
                      <div style={{ flex: '1 1 25%' }}>
                        <Form.Item label="分享海报" name="sharePoster2" rules={[{ required: true, message: '请上传分享海报' }]}>
                          <PosterUpload label="点击上传分享海报" />
                        </Form.Item>
                        <div style={{ fontSize: 12, color: '#8c8c8c', marginTop: -8 }}>用户分享裂变时生成的海报素材</div>
                      </div>
                    </div>
                  </div>

                  {/* ===== 区块三：期次管理 ===== */}
                  <hr className="section-divider" />
                  <div className="section-title">期次管理</div>
                  <div className="form-area" style={{ paddingTop: 16, paddingBottom: 20 }}>
                    {/* 大周期时间 */}
                    <Form.Item label="活动时间范围" name="cycleTime" rules={[{ required: true, message: '请选择活动时间范围' }]}>
                      <RangePicker
                        style={{ width: '100%', maxWidth: 480 }}
                        disabledDate={(current) => current && current.isBefore(dayjs().startOf('day').add(1, 'day'))}
                        placeholder={['开始日期', '结束日期']}
                      />
                    </Form.Item>
                    {/* 卡片列表 */}
                    <div className="period-list">
                      {periods.map((p) => {
                        const hasPeriodError = periodErrors[`${p.id}_start`] || periodErrors[`${p.id}_end`] || periodErrors[`${p.id}_purchaseLimit`];
                        return (
                        <div className={`period-card${hasPeriodError ? ' period-error' : ''}`} key={p.id}>
                          <div className="period-card-header">
                            <span className="period-card-title">第 {p.period} 期</span>
                            {p.period > 1 && (
                              <Tooltip title="删除期次">
                                <div className="period-card-delete" onClick={() => {
                                  Modal.confirm({
                                    title: '确认删除',
                                    content: `确定要删除「第 ${p.period} 期」吗？删除后剩余期次将自动重编号。`,
                                    okText: '确认删除',
                                    cancelText: '取消',
                                    okButtonProps: { danger: true },
                                    onOk: () => deletePeriod(p.id),
                                  });
                                }}>
                                  <I d="M18 6L6 18M6 6l12 12" size={16} />
                                </div>
                              </Tooltip>
                            )}
                          </div>
                          <div className="period-card-body">
                            <div style={{ marginBottom: 8 }}>
                              <label style={{ fontSize: 13, color: '#595959', display: 'block', marginBottom: 4 }}>活动时间</label>
                              <RangePicker
                                style={{ width: '100%' }}
                                status={periodErrors[`${p.id}_start`] || periodErrors[`${p.id}_end`] ? 'error' : ''}
                                value={[p.start ? dayjs(p.start) : null, p.end ? dayjs(p.end) : null]}
                                onChange={(dates) => {
                                  const startDate = dates && dates[0] ? dates[0].format('YYYY-MM-DD') : null;
                                  let endDate = dates && dates[1] ? dates[1].format('YYYY-MM-DD') : null;
                                  // 如果是最后一期，自动将结束时间校正为周期结束时间
                                  if (p.period === periods.length && endDate && form.getFieldValue('cycleTime') && form.getFieldValue('cycleTime')[1]) {
                                    endDate = form.getFieldValue('cycleTime')[1].format('YYYY-MM-DD');
                                  }
                                  setPeriods(periods.map(pp => pp.id === p.id ? { ...pp, start: startDate, end: endDate } : pp));
                                  setPeriodsChanged(true);
                                  setHasChanges(true);
                                }}
                                placeholder={['开始日期', '结束日期']}
                              />
                              {(periodErrors[`${p.id}_start`] || periodErrors[`${p.id}_end`]) && <div className="tier-error-msg">请选择活动时间</div>}
                            </div>
                            <div style={{ marginBottom: 8 }}>
                              <label style={{ fontSize: 13, color: '#595959', display: 'block', marginBottom: 4 }}>推广商品</label>
                              <Select
                                style={{ width: '100%' }}
                                value={p.product || undefined}
                                onChange={(v) => { updatePeriod(p.id, 'product', v); setPeriodsChanged(true); setHasChanges(true); }}
                                placeholder={selectedCity ? '请选择商品' : '请先选择活动城市'}
                                options={cityProductOptions}
                                disabled={!selectedCity}
                                status={periodErrors[`${p.id}_product`] ? 'error' : ''}
                              />
                              {periodErrors[`${p.id}_product`] && <div className="tier-error-msg">请选择推广商品</div>}
                            </div>
                            <div>
                              <label style={{ fontSize: 13, color: '#595959', display: 'block', marginBottom: 4 }}>资格购买上限</label>
                              <InputNumber
                                className={periodErrors[`${p.id}_purchaseLimit`] ? 'input-error' : ''}
                                style={{ width: '100%' }}
                                value={p.purchaseLimit}
                                onChange={(v) => { updatePeriod(p.id, 'purchaseLimit', v); setPeriodsChanged(true); setHasChanges(true); }}
                                placeholder="正整数"
                                min={1}
                                precision={0}
                              />
                              {periodErrors[`${p.id}_purchaseLimit`] && <div className="tier-error-msg">请输入正整数</div>}
                            </div>
                          </div>
                        </div>
                      );})}
                    </div>
                    <Button type="dashed" onClick={addPeriod} className="add-period-btn" block={false} style={{ width: 200, marginTop: 8 }}>
                      <I d="M12 5v14M5 12h14" size={14} /> 添加期次
                    </Button>
                  </div>
                </Form>

                {/* Sticky Footer (centered buttons) */}
                <div className="board-footer">
                  <Button onClick={handleBack}>取消</Button>
                  <Button type="primary" onClick={handleSave} loading={saveLoading}>确认保存</Button>
                </div>
              </div>
            </Content>
          </Layout>

          {/* Save Confirmation Modal */}
          <Modal
            title="确认保存活动配置"
            open={saveModalOpen}
            onOk={confirmSave}
            onCancel={() => setSaveModalOpen(false)}
            okText="确认保存"
            cancelText="取消"
            confirmLoading={saveLoading}
            width={720}
            styles={{ body: { padding: '16px 24px' } }}
          >
            {saveSummary && (
            <div style={{ maxHeight: '70vh', overflowY: 'auto' }}>
              {/* 区块一：基本信息 */}
              <Card title="基本信息" size="small" style={{ marginBottom: 12 }}>
                <Descriptions column={2} size="small" labelStyle={{ color: '#8c8c8c' }}>
                  <Descriptions.Item label="活动名称" span={2}>{saveSummary.name}</Descriptions.Item>
                  <Descriptions.Item label="活动规则" span={2}>{saveSummary.rules}</Descriptions.Item>
                </Descriptions>
              </Card>

              {/* 区块二：主活动配置 */}
              <Card title="主活动配置" size="small" style={{ marginBottom: 12 }}>
                <Descriptions column={2} size="small" labelStyle={{ color: '#8c8c8c' }}>
                  <Descriptions.Item label="活动城市">{saveSummary.city}</Descriptions.Item>
                  <Descriptions.Item label="门槛升值" span={2}>{saveSummary.upgrade}</Descriptions.Item>
                </Descriptions>
                <div style={{ marginTop: 8, marginBottom: 4 }}>
                  <span style={{ fontSize: 12, color: '#8c8c8c' }}>奖励阶梯（共 {saveSummary.tierCount} 档）</span>
                </div>
                <Table
                  size="small"
                  pagination={false}
                  showHeader={false}
                  columns={[
                    { title: '门槛', dataIndex: 'threshold', width: 60, render: v => (
                      <span style={{ fontWeight: 600 }}>{v}人</span>
                    )},
                    { title: '奖励', dataIndex: 'reward', ellipsis: true, render: (v, _, i) => (
                      <span>{v}{i === 0 && <Tag color="blue" style={{ fontSize: 11, padding: '0 4px', marginLeft: 6 }}>返还本金</Tag>}</span>
                    )},
                    { title: '名额', dataIndex: 'maxWinners', width: 60, align: 'right', render: v => v ? v + '人' : '无限制' },
                  ]}
                  dataSource={saveSummary.tierDetails}
                  rowKey="threshold"
                />
              </Card>

              {/* 区块三：期次管理 */}
              <Card title="期次管理" size="small">
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 12, color: '#8c8c8c', flexShrink: 0 }}>活动总时间：</span>
                  <span style={{ fontSize: 13, color: '#1f1f1f' }}>{saveSummary.cycle}</span>
                </div>
                <Table
                  size="small"
                  pagination={false}
                  columns={[
                    { title: '期次', dataIndex: 'period', width: 70, render: v => `第 ${v} 期` },
                    { title: '推广商品', dataIndex: 'product', width: 110, ellipsis: true, render: v => v || '--' },
                    { title: '活动时间', render: (_, r) => {
                      const s = r.start ? dayjs(r.start).format('YYYY-MM-DD') : '--';
                      const e = r.end ? dayjs(r.end).format('YYYY-MM-DD') : '--';
                      return `${s} ~ ${e}`;
                    }},
                    { title: '资格购买上限', dataIndex: 'purchaseLimit', width: 100, align: 'right', render: v => (v ? v + ' 人' : '--') },
                  ]}
                  dataSource={saveSummary.periods}
                  rowKey="period"
                />
              </Card>
            </div>
            )}
          </Modal>

          {/* Leave Confirmation Modal */}
          <Modal
            title="确认离开"
            open={leaveModalOpen}
            onOk={confirmLeave}
            onCancel={cancelLeave}
            okText="离开"
            cancelText="留在页面"
            okButtonProps={{ danger: true }}
          >
            <p style={{ color: '#595959', fontSize: 13 }}>当前页面有未保存的更改，确定要离开吗？</p>
          </Modal>
        </Layout>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
