                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  )}
                </span>
              </span>
            ),
            dataIndex: 'name',
            width: 160,
            render: (text, record) => {
              const masked = record.account.slice(0, 3) + '****' + record.account.slice(7);
              const display = `${record.name}/${accountVisible ? record.account : masked}`;
              return (
                <Tooltip title={`${record.name}/${record.account}`}>
                  <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 160 }}>
                    <div>{record.name}</div>
                    <div style={{ color: '#8c8c8c' }}>{accountVisible ? record.account : masked}</div>
                  </div>
                </Tooltip>
              );
            },
          },
          { title: '购买时间', dataIndex: 'buyTime', width: 160, align: 'center', render: (v) => v === '--' ? '--' : v },
          { title: '订单支付状态', dataIndex: 'orderStatus', width: 110, align: 'center', render: (s) => {
            const cls = { '已支付': 'status-tag-active', '待支付': 'status-tag-waiting', '已取消': 'status-tag-closed' }[s] || '';
            return <Tag className={cls}>{s}</Tag>;
          }},
          { title: '邀请转化数', dataIndex: 'conversion', width: 100, align: 'center', render: (v) => <span className="cell-number">{v}</span> },
          { title: '当前达成阶梯', dataIndex: 'tierLabel', width: 100, align: 'center', render: (v) => v === '--' ? <Tag>无</Tag> : <Tag>{v}</Tag> },
          { title: '奖励内容', dataIndex: 'rewardContent', width: 160, ellipsis: { showTitle: false }, render: (v) => v === '--' ? '--' : <Tooltip title={v}>{v.length > 12 ? v.slice(0, 12) + '...' : v}</Tooltip> },
          { title: '奖励状态', dataIndex: 'rewardStatus', width: 100, align: 'center', render: (s) => {
            const cls = { '未获得': 'status-tag-ended', '审核中': 'status-tag-waiting', '待发放': 'status-tag-active', '已发放': 'status-tag-closed' }[s] || '';
            return <Tag className={cls}>{s}</Tag>;
          }},
          {
            title: '操作', key: 'action', width: 160, align: 'center',
            render: (_, record) => (
              <Space size="small">
                <Button type="link" size="small" onClick={() => handleViewDetail(record)}>查看详情</Button>
                {record.rewardStatus === '待发放' && (
                  <Popconfirm title="确认发放" description={`确定要将「${record.name}」的奖励状态变更为「已发放」吗？`} onConfirm={() => handleRewardChange(record, '已发放')} okText="确认" cancelText="取消">
                    <Button type="link" size="small" className="action-btn text-success">发放</Button>
                  </Popconfirm>
                )}
              </Space>
            ),
          },
        );
        return cols;
      }, [showCheckbox, selectedRowKeys, paginatedData, tablePage, handleViewDetail, handleRewardChange, accountVisible]);

      // Stripped plain text from HTML rules
      const plainRules = useMemo(() => {
        if (!activity.rules) return '暂无活动规则';
        return activity.rules.replace(/<[^>]+>/g, '').trim() || '暂无活动规则';
      }, [activity.rules]);

      // ===== Operation Record columns =====
      const opColumns = [
        { title: '操作时间', dataIndex: 'time', width: 180 },
        { title: '操作人', dataIndex: 'operator', width: 120 },
        { title: '操作动作', dataIndex: 'action', width: 100, align: 'center', render: (s) => {
          const cls = { '创建活动': 'status-tag-active', '修改活动': 'status-tag-waiting', '手动关闭': 'status-tag-closed', '手动恢复': 'status-tag-ended' }[s] || '';
          return <Tag className={cls}>{s}</Tag>;
        }},
        { title: '详细说明', dataIndex: 'detail', ellipsis: true, render: (t) => <Tooltip title={t}>{t}</Tooltip> },
      ];

      return (
        <Layout style={{ minHeight: '100vh' }}>
          {contextHolder}
          <Sider width={200} collapsedWidth={56} theme="dark" collapsible collapsed={collapsed} trigger={null} style={{ overflow: 'auto', height: '100vh', position: 'sticky', top: 0, left: 0 }}>
            <div className="sidebar-logo" style={{ justifyContent: collapsed ? 'center' : 'flex-start' }}>
              <div className="sidebar-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" width="16" height="16">
                  <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
              </div>
              {!collapsed && <span className="sidebar-logo-text">喜行约车</span>}
            </div>
            <Menu theme="dark" mode="inline" defaultSelectedKeys={['activity-mgmt']} defaultOpenKeys={['helper', 'free-card']} inlineCollapsed={collapsed} items={menuItems} style={{ borderInlineEnd: 0 }} />
          </Sider>
          <Layout>
            <Header className="header-bar">
              <div className="header-left">
                <Button type="text" onClick={() => setCollapsed(!collapsed)} className="header-collapse-btn" aria-label={collapsed ? '展开侧边栏' : '收起侧边栏'}>
                  {collapsed ? <I d="M9 18l6-6-6-6" size={18} /> : <I d="M4 6h16M4 12h16M4 18h16" size={18} />}
                </Button>
                <Breadcrumb items={[
                  { title: '喜行小助手' },
                  { title: '免佣卡商城' },
                  { title: <a href="activity-list.html" style={{ color: '#595959' }}>活动管理</a> },

              <div className="header-avatar">管</div>
            </Header>
            <Content className="detail-page">
              {/* Page Title Row */}

                  <span className="page-title-text">活动详情</span>

                <Button icon={<I d="M12 8v4l3 3M7.49 7.49a9 9 0 100 9.02M16.51 16.51a9 9 0 000-9.02" size={14} />} onClick={() => setRecordModalOpen(true)}>
                  操作记录

              </div>

              {/* ===== Info Card ===== */}
              <div className="info-card">
                <Descriptions
                  bordered
                  size="small"
                  column={{ xxl: 4, xl: 3, lg: 3, md: 2, sm: 1, xs: 1 }}
                  items={[
                    { label: '活动名称', children: activity.name, span: 1 },
                    { label: '活动城市', children: activity.city },
                    { label: '主活动状态', children: <StatusTag status={activity.status} /> },
                    { label: '活动时间', children: `${activity.cycleStart} 至 ${activity.cycleEnd}` },
                    { label: '子活动期数', children: `共 ${activity.periods.length} 期` },
                    { label: '活动规则', children: (
                      <Tooltip title={<div dangerouslySetInnerHTML={{ __html: activity.rules || '暂无规则' }} />}>
                        <span style={{ cursor: 'pointer', display: 'inline-block', maxWidth: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>

                      </Tooltip>
                    ), span: 2 },
                    { label: 'Banner图', children: (
                      <img className="poster-thumb" src={activity.bannerPoster} alt="Banner图" onClick={() => { setPreviewSrc(activity.bannerPoster); setPreviewOpen(true); }} />

                    { label: '活动弹窗宣传海报', children: (
                      <img className="poster-thumb" src={activity.popupPoster} alt="活动弹窗宣传海报" onClick={() => { setPreviewSrc(activity.popupPoster); setPreviewOpen(true); }} />
                    )},
                    { label: '活动详情页-活动海报', children: (
                      <img className="poster-thumb" src={activity.bannerPoster} alt="活动详情页-活动海报" onClick={() => { setPreviewSrc(activity.bannerPoster); setPreviewOpen(true); }} />
                    )},
                    { label: '支付成功页-宣传海报', children: (
                      <img className="poster-thumb" src={activity.successPoster} alt="支付成功页-宣传海报" onClick={() => { setPreviewSrc(activity.successPoster); setPreviewOpen(true); }} />

                    { label: '分享海报', children: (
                      <img className="poster-thumb" src={activity.sharePoster} alt="分享海报" onClick={() => { setPreviewSrc(activity.sharePoster); setPreviewOpen(true); }} />
                    )},
                    {
                      label: '奖励阶梯',
                      children: (
                        <ul className="tier-list">
                          {activity.tiers.map((t, i) => (
                            <li key={i}>
                              转化 {t.threshold} 人 → {t.reward}
                              <span style={{ color: '#8c8c8c', marginLeft: 6 }}>(上限 {i === 0 && t.maxWinners ? t.maxWinners + ' 人' : '无限制'})</span>
                              {i === activity.tiers.length - 1 && <Tag color="blue" style={{ fontSize: 10, padding: '0 4px', marginLeft: 8, lineHeight: '16px' }}>返还本金</Tag>}
                            </li>
                          ))}
                        </ul>
                      ),
                      span: 3,
                    },
                    { label: '门槛类型及升值', children: <span>所有阶梯 + {activity.upgrade}人</span> },
                  ]}
                />
              </div>

              {/* ===== Special State: No data ===== */}
              {!showData && (
                <div className="no-data-hint">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="48" height="48">
                    <path d="M12 8v4M12 16h.01M3 21h18M5 21V7l8-4v18M19 21V11l-6-6" />
                  </svg>
                  <p>该活动尚未开始，暂无活动数据可查看</p>
                </div>
              )}

              {/* ===== Card View ===== */}
              {showData && (
                <>
                  <div className={`card-grid ${viewMode === 'table' ? 'hidden' : ''}`}>
                    {activity.periods.map((period, idx) => (
                      <div className="period-card" key={idx} onClick={() => handleCardClick(idx)}>
                        <div className="period-card-header">
                          <span className="period-card-title">第 {period.period} 期</span>
                          <StatusTag status={period.status} />
                        </div>
                        <div className="period-card-time">{period.start} ~ {period.end}</div>
                        <div style={{ fontSize: 13, marginBottom: 12 }}>
                          <span style={{ color: '#595959' }}>推广商品：</span><span style={{ color: '#262626' }}>{period.product || '--'}</span>
                        </div>
                        <div className="metric-grid">
                          <div className="metric-item">
                            <div className="metric-label">参与用户数</div>
                            <div className="metric-value">{period.users}</div>
                          </div>
                          <div className="metric-item">
                            <div className="metric-label">邀请转化数</div>
                            <div className="metric-value">{period.conversions}</div>
                          </div>
                          <div className="metric-item">
                            <div className="metric-label">获奖用户数</div>
                            <div className="metric-value">{period.winners}</div>
                          </div>
                          <div className="metric-item">
                            <div className="metric-label">最高奖励剩余</div>
                            <div className="metric-value">{period.remainingReward}<span className="metric-unit"> 份</span></div>
                          </div>
                        </div>
                        <div className="period-card-footer">
                          <span>资格购买上限</span>
                          <span style={{ fontWeight: 500 }}>{period.purchaseLimit} 人</span>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* ===== Table View ===== */}
                  <div className={`table-view ${viewMode === 'cards' ? 'hidden' : ''}`}>
                    {/* Toolbar */}
                    <div className="table-toolbar">
                      <div className="table-toolbar-left">
                        <Button type="text" onClick={handleBackToCards} icon={<I d="M15 18l-6-6 6-6" size={18} />} />
                      </div>
                      <div className="table-toolbar-right period-segmented" style={{ flex: 1 }}>
                        {React.createElement(antd.Segmented, {
                          value: selectedPeriod,
                          onChange: handlePeriodChange,
                          options: activity.periods.map((p, i) => ({
                            label: `第 ${p.period} 期 (${tabCounts[i] || 0})`,
                            value: i,
                          })),
                        })}
                      </div>
                      <div className="table-toolbar-right">
                        {showCheckbox && (
                          <Button
                            type="primary"
                            size="middle"
                            disabled={selectedRowKeys.length === 0}
                            onClick={handleBatchOperation}
                            style={{ fontWeight: 500 }}
                          >
                            批量发放
                            {selectedRowKeys.length > 0 && ` (${selectedRowKeys.length})`}
                          </Button>
                        )}
                      </div>
                    </div>

                    {/* Filters */}
                    <div className="table-filter-row">
                      <div className="table-filter-item">
                        <span className="table-filter-label">用户昵称 / 小助手账号</span>
                        <Input
                          placeholder="请输入用户昵称或账号"
                          value={filterNickname}
                          onChange={(e) => setFilterNickname(e.target.value)}
                          allowClear
                          style={{ width: 200 }}
                        />
                      </div>
                      <div className="table-filter-item">
                        <span className="table-filter-label">奖励内容</span>
                        <Input
                          placeholder="搜索奖励内容"
                          value={filterRewardContent}
                          onChange={(e) => setFilterRewardContent(e.target.value)}
                          allowClear
                          style={{ width: 160 }}
                        />
                      </div>
                      <div className="table-filter-item">
                        <span className="table-filter-label">订单支付状态</span>
                        <Select
                          value={filterOrderStatus}
                          onChange={(v) => setFilterOrderStatus(v || '')}
                          allowClear
                          style={{ width: 140 }}
                          options={[
                            { label: '全部', value: '' },
                            { label: '已支付', value: '已支付' },
                            { label: '待支付', value: '待支付' },
                            { label: '已取消', value: '已取消' },
                          ]}
                        />
                      </div>
                      <div className="table-filter-item">
                        <span className="table-filter-label">奖励状态</span>
                        <Select
                          value={filterRewardStatus}
                          onChange={(v) => setFilterRewardStatus(v || '')}
                          allowClear
                          style={{ width: 140 }}
                          options={[
                            { label: '全部', value: '' },
                            { label: '未获得', value: '未获得' },
                            { label: '待发放', value: '待发放' },
                            { label: '已发放', value: '已发放' },
                          ]}
                        />
                      </div>
                      <Button type="primary" onClick={() => {
                        saveCurrentPeriodFilters();
                        setTablePage({ current: 1, size: tablePage.size });
                      }}>查询</Button>
                      <Button onClick={() => {
                        setFilterNickname('');
                        setFilterRewardContent('');
                        setFilterOrderStatus('已支付');
                        setFilterRewardStatus('');
                        setTablePage({ current: 1, size: tablePage.size });
                        // Also save the reset state to current period
                        setPeriodFilterState(prev => {
                          const next = [...prev];
                          next[selectedPeriod] = { nickname: '', rewardContent: '', orderStatus: '已支付', rewardStatus: '' };
                          return next;
                        });
                      }}>重置</Button>
                      <Button icon={<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>} style={{ marginLeft: 'auto' }}>导出</Button>
                    </div>

                    {/* Table */}
                    <div className="table-container" style={{ padding: 16 }}>
                      <Table
                        columns={tableColumns}
                        dataSource={paginatedData}
                        rowKey="key"
                        pagination={false}
                        scroll={{ x: 1200 }}
                        locale={{ emptyText: '暂无参与用户' }}
                        rowClassName={(record) => selectedRowKeys.includes(record.key) ? 'ant-table-row-selected' : ''}
                      />
                      <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 16 }}>
                        <Pagination
                          current={tablePage.current}
                          pageSize={tablePage.size}
                          total={periodUserData.length}
                          showSizeChanger
                          showQuickJumper
                          pageSizeOptions={['10', '20', '50']}
                          showTotal={(total) => `共 ${total} 条`}
                          onChange={(page, size) => { setTablePage({ current: page, size: size || tablePage.size }); }}
                          onShowSizeChange={(page, size) => { setTablePage({ current: 1, size }); }}
                        />
                      </div>
                    </div>
                  </div>
                </>
              )}
            </Content>
          </Layout>

          {/* ===== User Detail Drawer ===== */}
          <Drawer
            title="用户详情"
            placement="right"
            width={720}
            open={drawerOpen}
            onClose={() => setDrawerOpen(false)}
            destroyOnClose
          >
            {selectedUser && (
              <>
                {/* User Base Info */}
                <div className="drawer-user-info">
                  <Descriptions
                    bordered
                    size="small"
                    column={2}
                    items={[
                      { label: '用户昵称', children: selectedUser.name },
                      { label: '用户账号', children: selectedUser.account },
                      { label: '购买时间', children: selectedUser.buyTime },
                      { label: '所属子活动期次', children: <Tag>第 {selectedUser.period + 1} 期</Tag> },
                      { label: '邀请转化数', children: <span className="cell-number">{selectedUser.conversion}</span> },
                      { label: '当前达成阶梯', children: selectedUser.tierLabel === '--' ? '无' : <Tag>{selectedUser.tierLabel}</Tag> },
                      { label: '奖励状态', children: (() => {
                        const cls = { '未获得': 'status-tag-ended', '审核中': 'status-tag-waiting', '待发放': 'status-tag-active', '已发放': 'status-tag-closed' }[selectedUser.rewardStatus] || '';
                        return <Tag className={cls}>{selectedUser.rewardStatus}</Tag>;
                      })()},
                      { label: '奖励内容', children: selectedUser.rewardContent === '--' ? '无' : selectedUser.rewardContent },
                    ]}
                  />
                </div>

                {/* Tabs */}
                <div className="drawer-tabs-area">
                  <Tabs
                    items={[
                      {
                        key: 'invite',
                        label: '邀请记录',
                        children: <InviteTable records={selectedUser.inviteRecords} />,
                      },
                      {
                        key: 'order',
                        label: '订单记录',
                        children: <OrderTable records={selectedUser.orderRecords} />,
                      },
                      {
                        key: 'reward',
                        label: '奖励记录',
                        children: <RewardTab records={selectedUser.rewardRecords} />,
                      },
                    ]}
                    defaultActiveKey="invite"
                    onChange={(key) => setDrawerTab(key)}
                  />
                </div>
              </>
            )}
          </Drawer>

          {/* ===== Operation Record Modal ===== */}
          <Modal
            title="操作记录"
            open={recordModalOpen}
            onCancel={() => setRecordModalOpen(false)}
            footer={null}
            width={800}
          >
            <Table
              className="record-modal-table"
              columns={opColumns}
              dataSource={opRecords}
              rowKey="key"
              pagination={{ pageSize: 10, showTotal: (t) => `共 ${t} 条` }}
              locale={{ emptyText: '暂无操作记录' }}
            />
          </Modal>

          {/* ===== Image Preview Modal ===== */}
          <Modal
            open={previewOpen}
            onCancel={() => setPreviewOpen(false)}
            footer={null}
            width="auto"
            bodyStyle={{ padding: 16, textAlign: 'center' }}
          >
            <img
              src={previewSrc}
              alt="预览"
              style={{ maxWidth: '100%', maxHeight: '70vh', borderRadius: 8, boxShadow: '0 4px 16px rgba(0,0,0,0.15)' }}
            />
          </Modal>
        </Layout>
      );
    }

    // ===== Sub-components =====

    function InviteTable({ records }) {
      const [filterStatus, setFilterStatus] = useState('已成功');
      const [accountVisible, setAccountVisible] = useState(false);
      const filtered = useMemo(() => {
        return records.filter(r => r.status === filterStatus);
      }, [records, filterStatus]);

      const hasFailed = records.some(r => r.status === '已失效');
      const columns = useMemo(() => [
        { title: '序号', key: 'index', width: 56, align: 'center', render: (_, __, idx) => idx + 1 },
        { title: '被邀请人昵称', dataIndex: 'inviteeName', width: 120, ellipsis: { showTitle: false }, render: (v) => {
          const display = v.length > 12 ? v.slice(0, 12) + '...' : v;
          return <Tooltip title={v}>{display}</Tooltip>;
        }},
        {
          title: (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              被邀请人账号
              <span
                style={{ cursor: 'pointer', color: accountVisible ? '#1677ff' : '#bfbfbf', display: 'inline-flex', alignItems: 'center' }}
                onClick={() => setAccountVisible(!accountVisible)}
                title={accountVisible ? '隐藏账号' : '显示账号'}
              >
                {accountVisible ? (
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                ) : (
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                )}
              </span>
            </span>
          ),
          width: 150,
          render: (_, record) => accountVisible ? record.inviteeAccount : record.inviteeAccountMasked,
        },
        { title: '订单号', dataIndex: 'orderNo', width: 180, ellipsis: true },
        { title: '完成时间（购买时间）', dataIndex: 'buyTime', width: 170, align: 'center' },
        ...(hasFailed ? [{ title: '失效时间（退款时间）', dataIndex: 'expireTime', width: 170, align: 'center', render: (v) => v === '--' ? '--' : v }] : []),
        { title: '邀请状态', dataIndex: 'status', width: 90, align: 'center', render: (s) => <Tag className={s === '已成功' ? 'status-tag-active' : 'status-tag-closed'}>{s}</Tag> },
      ], [hasFailed, accountVisible]);

      if (records.length === 0) {
        return <div className="drawer-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="40" height="40"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8z" /></svg><p>暂无邀请记录</p></div>;
      }

      return (
        <>
          <div style={{ marginBottom: 12, display: 'flex', gap: 12, alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: '#8c8c8c' }}>邀请状态</span>
            <Select value={filterStatus} onChange={setFilterStatus} style={{ width: 140 }} options={[
              { label: '已成功', value: '已成功' },
              { label: '已失效', value: '已失效' },
            ]} />
          </div>
          <Table columns={columns} dataSource={filtered} rowKey="key" pagination={{ pageSize: 10 }} locale={{ emptyText: '暂无数据' }} scroll={{ y: 300 }} size="small" />
        </>
      );
    }

    function OrderTable({ records }) {
      const [phoneVisible, setPhoneVisible] = useState(false);
      const columns = [
        { title: '订单编号', dataIndex: 'orderNo', width: 180, ellipsis: true },
        {
          title: (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              接单手机号
              <span
                style={{ cursor: 'pointer', color: phoneVisible ? '#1677ff' : '#bfbfbf', display: 'inline-flex', alignItems: 'center' }}
                onClick={() => setPhoneVisible(!phoneVisible)}
                title={phoneVisible ? '隐藏手机号' : '显示手机号'}
              >
                {phoneVisible ? (
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                ) : (
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                )}
              </span>
            </span>
          ),
          dataIndex: 'orderPhone',
          width: 140,
          align: 'center',
          render: (_, record) => (phoneVisible ? record.orderPhoneFull : record.orderPhone) || '--',
        },
        { title: '活动名称-期次', dataIndex: 'activityName', width: 180, ellipsis: true },
        { title: '商品名称', dataIndex: 'productName', width: 120 },
        { title: '订单金额', dataIndex: 'amount', width: 100, align: 'center', render: (v) => <span>¥{Number(v).toFixed(2)}</span> },
        { title: '订单状态', dataIndex: 'status', width: 90, align: 'center', render: (s) => {
          const cls = { '待支付': 'status-tag-waiting', '已支付': 'status-tag-active', '已取消': 'status-tag-closed' }[s] || '';
          return <Tag className={cls}>{s}</Tag>;
        }},
        { title: '创建时间', dataIndex: 'createTime', width: 160, render: (v) => v === '--' ? '--' : v },
        { title: '取消时间', dataIndex: 'cancelTime', width: 160, render: (v) => v === '--' ? '--' : v },
        { title: '支付时间', dataIndex: 'payTime', width: 160, render: (v) => v === '--' ? '--' : v },
        { title: '退款时间', dataIndex: 'refundTime', width: 160, render: (v) => v === '--' ? '--' : v },
      ];

      if (records.length === 0) {
        return <div className="drawer-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="40" height="40"><path d="M20 12V6a2 2 0 00-2-2H6a2 2 0 00-2 2v6M6 12v4a2 2 0 002 2h8a2 2 0 002-2v-4M6 12h12" /></svg><p>暂无订单记录</p></div>;
      }

      return <Table columns={columns} dataSource={records} rowKey="key" pagination={{ pageSize: 10 }} locale={{ emptyText: '暂无数据' }} scroll={{ y: 300 }} size="small" />;
    }

    function RewardTab({ records }) {
      const [messageApi, contextHolder] = message.useMessage();

      const columns = [
        { title: '活动名称-期次', dataIndex: 'activityName', width: 180, ellipsis: true },
        { title: '完成数', dataIndex: 'completion', width: 80, align: 'center', render: (v) => <span className="cell-number">{v}</span> },
        { title: '奖励内容', dataIndex: 'rewardContent', width: 200 },
        { title: '确认发放时间', dataIndex: 'confirmTime', width: 160, render: (v) => v === '--' ? '--' : v },
        { title: '发放状态', dataIndex: 'status', width: 90, align: 'center', render: (s) => {
          const cls = { '审核中': 'status-tag-waiting', '待发放': 'status-tag-active', '已发放': 'status-tag-closed' }[s] || '';
          return <Tag className={cls}>{s}</Tag>;
        }},
        {
          title: '操作', key: 'action', width: 120, align: 'center',
          render: (_, record) => (
            <Space size="small">
              {record.status === '待发放' && (
                <Popconfirm title="确认发放" description="确定发放该奖励吗？" onConfirm={() => messageApi.success('已发放奖励')} okText="确认" cancelText="取消">
                  <Button type="link" size="small">发放</Button>
                </Popconfirm>
              )}
            </Space>
          ),
        },
      ];

      if (records.length === 0) {
        return <div className="drawer-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="40" height="40"><path d="M12 15l-2 5-3-1 1-3-3-2 3-1-1-3 2 2 2-2-1 3 3 1-3 1z" /></svg><p>暂未获得任何奖励</p></div>;
      }

      return <>{contextHolder}<Table columns={columns} dataSource={records} rowKey="key" pagination={{ pageSize: 10 }} locale={{ emptyText: '暂无数据' }} scroll={{ y: 300 }} size="small" /></>;
    }

    // Tabs needs to be destructured from antd
    const { Tabs } = antd;

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
