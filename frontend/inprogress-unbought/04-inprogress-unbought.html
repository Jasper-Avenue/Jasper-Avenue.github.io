<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏日派对 · 进行中-未购买</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="root"></div>

<!-- CDN 依赖 -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<!-- 动画模块：Canvas 拓扑三角网格 (L3) -->
<script src="js/topo-canvas.js"></script>

<!-- 数据与组件 (纯 JS，无 JSX) -->
<script src="js/app.js"></script>

<!-- JSX 渲染入口（必须 inline，Babel 无法通过 src 加载外部 JSX） -->
<script type="text/babel">
// ═══════════════════════════════════════════
// MiniAppFrame — iPhone 15 Pro + 微信顶栏模拟
// ═══════════════════════════════════════════
const frameStyles = {
  wrapper:{display:'inline-block',padding:3,background:'#1a1a1a',borderRadius:50,boxShadow:'0 8px 40px rgba(0,0,0,0.18)'},
  screen:{position:'relative',borderRadius:48,overflow:'hidden',background:'#fff'},
  statusBar:{position:'absolute',top:0,left:0,right:0,height:54,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',fontSize:16,fontWeight:600,fontFamily:'-apple-system,"SF Pro Text",sans-serif',zIndex:20,pointerEvents:'none'},
  dynamicIsland:{position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',width:124,height:36,background:'#000',borderRadius:999,zIndex:30},
  statusIcons:{display:'flex',alignItems:'center',gap:6},
  signalIcon:{display:'flex',alignItems:'flex-end',gap:2,height:12},
  signalBar:{width:3,background:'currentColor',borderRadius:1},
  batteryIcon:{width:26,height:12,border:'1.5px solid currentColor',borderRadius:3,padding:1,position:'relative',opacity:0.8},
  batteryCap:{position:'absolute',top:3,right:-3,width:2,height:6,background:'currentColor',borderRadius:'0 1px 1px 0'},
  wechatTopBar:{position:'absolute',top:50,left:0,right:0,height:44,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 15px',zIndex:15},
  navLeft:{display:'flex',alignItems:'center',gap:0},
  backBtn:{display:'flex',alignItems:'center',gap:0,background:'none',border:'none',cursor:'pointer',padding:'4px 2px',borderRadius:8,fontSize:14,color:'#3D3730',fontWeight:500},
  wechatPill:{display:'flex',alignItems:'center',background:'rgba(255,255,255,0.85)',borderRadius:20,padding:'4px 4px',backdropFilter:'blur(10px)',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'},
  wechatMore:{width:28,height:22,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'},
  wechatDivider:{width:1,height:14,background:'rgba(0,0,0,0.08)',flexShrink:0},
  wechatClose:{width:28,height:22,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'},
  content:{position:'absolute',top:94,left:0,right:0,bottom:34,overflowY:'auto',overflowX:'hidden'},
  homeIndicator:{position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',width:140,height:5,background:'rgba(0,0,0,0.3)',borderRadius:999,zIndex:10},
};

function MiniAppFrame({children,width=393,height=852,time='9:41',battery=85,darkMode=false,contentBg='#f5f5f5',bottomBar=null}){
  const tbh=bottomBar?72:0;
  return(
    <div style={frameStyles.wrapper}>
      <div style={{...frameStyles.screen,width,height,background:darkMode?'#000':'#fff'}}>
        <div style={{...frameStyles.statusBar,color:darkMode?'#fff':'#000'}}>
          <span>{time}</span>
          <div style={frameStyles.statusIcons}>
            <div style={frameStyles.signalIcon}><div style={{...frameStyles.signalBar,height:4}}/><div style={{...frameStyles.signalBar,height:6}}/><div style={{...frameStyles.signalBar,height:9}}/><div style={{...frameStyles.signalBar,height:11}}/></div>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{color:darkMode?'#fff':'#000'}}><path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/><path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round"/><path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7"/></svg>
            <div style={frameStyles.batteryIcon}><div style={{width:`${battery}%`,height:'100%',background:'currentColor',borderRadius:1,opacity:0.9}}/><div style={frameStyles.batteryCap}/></div>
          </div>
        </div>
        <div style={frameStyles.dynamicIsland}/>
        <div style={frameStyles.wechatTopBar}>
          <div style={frameStyles.navLeft}>
            <button style={frameStyles.backBtn} onClick={() => window.location.href = '../index.html'}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </button>
          </div>
          <div style={frameStyles.wechatPill}>
            <div style={frameStyles.wechatMore}><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2" fill="#333"/><circle cx="12" cy="12" r="2" fill="#333"/><circle cx="18" cy="12" r="2" fill="#333"/></svg></div>
            <div style={frameStyles.wechatDivider}/>
            <div style={frameStyles.wechatClose}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="2.2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5" fill="#333" stroke="none"/></svg></div>
          </div>
        </div>
        <div style={{...frameStyles.content,background:contentBg,bottom:34+tbh}}>{children}</div>
        {bottomBar && <div style={{position:'absolute',bottom:34,left:0,right:0,height:72,zIndex:10,background:darkMode?'#1a1a1a':'#fff',borderTop:`1px solid ${darkMode?'#333':'#eee'}`,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 16px'}}>{bottomBar}</div>}
        <div style={{...frameStyles.homeIndicator,...(darkMode?{background:'rgba(255,255,255,0.5)'}:{})}}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// ActivityPage — Takram × 思辨设计 (Production)
// ═══════════════════════════════════════════
const ActivityPage = () => {
  const [exp, setExp] = React.useState(false);
  const [entered, setEntered] = React.useState(false);
  const cleanupRef = React.useRef(null);
  const pct = ((prog.cur / prog.total) * 100).toFixed(1);

  // 获奖进度 · 数据驱动
  const curT = tiers.find(t => t.cur) || tiers[0];
  const curThresh = parseInt(curT.cond.replace(/[^0-9]/g, ''));
  const need = Math.max(curThresh - prog.cur, 0);
  const barW = prog.total > 0 ? Math.min((prog.cur / prog.total) * 100, 100) : 0;

  // 页面加载时间轴 — Slow-Fast-Boom-Stop
  React.useEffect(()=>{ requestAnimationFrame(()=>{ setEntered(true); }); },[]);

  // Canvas 三角网格 — 委托给 topo-canvas.js 模块 (L3)
  React.useEffect(()=>{
    const canvas = document.getElementById('topoCanvas');
    if (!canvas) return;
    cleanupRef.current = window.TopoCanvas.init(canvas);
    return ()=>{ if (cleanupRef.current) cleanupRef.current(); };
  },[]);

  return (
    <MiniAppFrame contentBg="#F5F0EB" bottomBar={
      <div style={{
        opacity:entered?1:0, width:'100%',
        animation: entered ? 'ctaFloat 0.5s cubic-bezier(0.16,1,0.3,1) 1.3s both' : 'none',
      }}>
        <div className="cta-pulse-wrap">
          <button style={{
            position:'relative', zIndex:1, overflow:'hidden',
            display:'flex', alignItems:'center', justifyContent:'center', gap:12,
            width:'100%', height:48, borderRadius:24, border:'none',
            background:'linear-gradient(135deg, #F1DDDF 0%, #E72D48 100%)',
            color:'#fff', fontSize:15, fontWeight:500,
            fontFamily:'"Noto Sans SC",sans-serif', letterSpacing:2,
            cursor:'pointer',
            boxShadow:'0 2px 12px rgba(231,45,72,0.25)',
            transition:'box-shadow 0.2s ease, transform 0.15s cubic-bezier(0.34,1.56,0.64,1)',
          }}
          onClick={() => { window.location.href = '../05-purchase-confirm.html'; }}
          onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 20px rgba(231,45,72,0.35)';e.currentTarget.style.transform='translateY(-1px)'}}
          onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 12px rgba(231,45,72,0.25)';e.currentTarget.style.transform='translateY(0)'}}
          onMouseDown={e=>{e.currentTarget.style.transform='scale(0.96)'}}
          onMouseUp={e=>{e.currentTarget.style.transform='translateY(-1px)'}}
          >
            <span>立即报名</span>
            <span style={{
              fontFamily:'"Inter",sans-serif',
              fontSize:14,fontWeight:500,letterSpacing:'-0.2px',
            }}>¥69.99</span>
            <div className="cta-sweep" style={{
              position:'absolute',top:0,left:0,right:0,bottom:0,pointerEvents:'none',
              background:'linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.1) 50%,transparent 100%)',
              backgroundSize:'200% 100%',
              animation:'ctaSweep 3s ease-in-out infinite',
            }}/>
          </button>
        </div>
      </div>
    }>
      <div style={{
        padding:'0', minHeight:'100%',
        fontFamily:'"Inter","Noto Sans SC",sans-serif', color:'#3D3730',
        position:'relative', overflow:'hidden',
      }}>
        {/* Paper texture */}
        <div style={{
          position:'absolute',inset:0,pointerEvents:'none',zIndex:0,opacity:0.6,
          backgroundImage:`repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.004) 3px,rgba(0,0,0,0.004) 6px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,0.003) 3px,rgba(0,0,0,0.003) 6px)`,
        }}/>

        {/* 水彩色块 — 活动氛围层（极慢漂移）*/}
        <div className="ambient-blob ambient-blob--warm" style={{width:320,height:280,top:'-5%',left:'-10%'}}/>
        <div className="ambient-blob ambient-blob--green" style={{width:280,height:240,bottom:'10%',right:'-8%'}}/>
        <div className="ambient-blob ambient-blob--soft" style={{width:260,height:220,top:'35%',left:'20%'}}/>

        {/* 拓扑等高线 — 3 组，不同方向和速度 */}
        <div style={{position:'absolute',top:'30%',left:'55%',width:280,height:200,opacity:0.045,zIndex:0,transformOrigin:'50% 50%',animation:'contourSpin1 120s linear infinite'}}>
          {[80,64,48,32,16].map((r,i)=><div key={i} style={{position:'absolute',top:'50%',left:'50%',width:r*3.5,height:r*2.5,borderRadius:'50%',border:`1px solid rgba(168,160,152,${0.6-i*0.1})`,transform:'translate(-50%,-50%)'}}/>)}
        </div>
        <div style={{position:'absolute',top:'65%',left:'25%',width:180,height:140,opacity:0.035,zIndex:0,transformOrigin:'50% 50%',animation:'contourSpin2 90s linear infinite'}}>
          {[60,45,30,15].map((r,i)=><div key={i} style={{position:'absolute',top:'50%',left:'50%',width:r*3,height:r*2.2,borderRadius:'50%',border:`1px solid rgba(107,143,113,${0.5-i*0.08})`,transform:'translate(-50%,-50%)'}}/>)}
        </div>
        <div style={{position:'absolute',top:'15%',left:'15%',width:160,height:120,opacity:0.03,zIndex:0,transformOrigin:'50% 50%',animation:'contourSpin3 150s linear infinite'}}>
          {[50,35,20].map((r,i)=><div key={i} style={{position:'absolute',top:'50%',left:'50%',width:r*3.2,height:r*2.4,borderRadius:'50%',border:`1px solid rgba(139,115,85,${0.4-i*0.08})`,transform:'translate(-50%,-50%)'}}/>)}
        </div>

        {/* Canvas 三角网格 — L3 标注 */}
        <canvas id="topoCanvas" style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0,opacity:0.035}}/>

        <div style={{position:'relative',zIndex:1}}>

          {/* Header */}
          <div style={{
            padding:'14px 20px 10px', display:'flex', justifyContent:'space-between', alignItems:'center',
            opacity:entered?1:0, transform:entered?'translateY(0)':'translateY(-6px)',
            transition:'opacity 0.4s cubic-bezier(0.16,1,0.3,1) 0s, transform 0.4s cubic-bezier(0.16,1,0.3,1) 0s',
          }}>
            <div style={{fontSize:13, fontWeight:500, letterSpacing:'1px', color:'#2E2A24'}}>
              夏日派对
              <span style={{display:'inline-block',width:4,height:4,margin:'0 8px',background:'#A8A098',borderRadius:'50%',verticalAlign:'middle',opacity:0.5}}/>
              一起狂欢
            </div>
            <div style={{
              display:'flex', alignItems:'center', gap:5,
              padding:'6px 14px', borderRadius:999, cursor:'pointer',
              background:'linear-gradient(135deg, rgba(168,160,152,0.12) 0%, rgba(168,160,152,0.06) 100%)',
              backdropFilter:'blur(8px)',
              border:'1px solid rgba(168,160,152,0.2)',
              transition:'transform 0.15s cubic-bezier(0.34,1.56,0.64,1)',
            }}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(0.97)';const svg=e.currentTarget.querySelector('svg');if(svg)svg.style.transform='rotate(15deg)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';const svg=e.currentTarget.querySelector('svg');if(svg)svg.style.transform='rotate(0deg)'}}
            onClick={()=>{ window.location.href = '../09-participation-record.html?from=unbought'; }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#A8A098" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{transition:'transform 0.2s cubic-bezier(0.34,1.56,0.64,1)'}}>
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              <span style={{fontSize:12, color:'#A8A098', fontWeight:600, letterSpacing:'0.5px'}}>参与记录</span>
            </div>
          </div>
          <div style={{height:1, background:'linear-gradient(90deg, transparent, #C8C2B6 30%, #C8C2B6 70%, transparent)', margin:'0 20px'}}/>

          {/* Countdown — 心跳节律 */}
          <div style={{textAlign:'center', padding:'20px 20px 16px', opacity:entered?1:0, transform:entered?'translateY(0)':'translateY(8px)', transition:'opacity 0.5s cubic-bezier(0.16,1,0.3,1) 0.2s, transform 0.5s cubic-bezier(0.16,1,0.3,1) 0.2s'}}>
            <div style={{fontSize:12, color:'#6B8F71', fontWeight:500, letterSpacing:'3px', marginBottom:14, opacity:0.7, display:'flex', alignItems:'center', justifyContent:'center', gap:6}}>
              <span style={{width:4,height:4,borderRadius:'50%',background:'#6B8F71',display:'inline-block',animation:'breathe 2s ease-in-out infinite'}}/>
              距活动结束
            </div>
            <div style={{display:'flex', alignItems:'baseline', justifyContent:'center', gap:2}}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{animation:'heartbeat 2s ease-in-out infinite'}}>
                  <span style={{fontFamily:'"Noto Serif SC",serif',fontSize:36,fontWeight:500,color:'#2E2A24',lineHeight:1}}>{String(cd.days).padStart(2,'0')}</span>
                </div>
                <span style={{fontSize:10, color:'#A8A098', fontWeight:400, letterSpacing:'2px',animation:'labelDrift 4s ease-in-out infinite 0s'}}>天</span>
              </div>
              <div style={{animation:'colonFloat 1.6s ease-in-out infinite',display:'inline-block',fontFamily:'"Noto Serif SC",serif',fontSize:36,fontWeight:400,color:'#8B7355',lineHeight:1,padding:'0 1px 0 0',filter:'drop-shadow(0 0 2px rgba(139,115,85,0.25))',alignSelf:'flex-start',marginTop:0}}>:</div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{animation:'heartbeat 2s ease-in-out infinite 0.3s'}}>
                  <span style={{fontFamily:'"Noto Serif SC",serif',fontSize:36,fontWeight:500,color:'#2E2A24',lineHeight:1}}>{String(cd.hours).padStart(2,'0')}</span>
                </div>
                <span style={{fontSize:10, color:'#A8A098', fontWeight:400, letterSpacing:'2px',animation:'labelDrift 4s ease-in-out infinite 0.6s'}}>时</span>
              </div>
              <div style={{animation:'colonFloat 1.6s ease-in-out infinite 0.4s',display:'inline-block',fontFamily:'"Noto Serif SC",serif',fontSize:36,fontWeight:400,color:'#8B7355',lineHeight:1,padding:'0 1px 0 0',filter:'drop-shadow(0 0 2px rgba(139,115,85,0.25))',alignSelf:'flex-start',marginTop:0}}>:</div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{animation:'heartbeat 2s ease-in-out infinite 0.6s'}}>
                  <span style={{fontFamily:'"Noto Serif SC",serif',fontSize:36,fontWeight:500,color:'#2E2A24',lineHeight:1}}>{String(cd.minutes).padStart(2,'0')}</span>
                </div>
                <span style={{fontSize:10, color:'#A8A098', fontWeight:400, letterSpacing:'2px',animation:'labelDrift 4s ease-in-out infinite 1.2s'}}>分</span>
              </div>
            </div>
          </div>

          {/* 进度区 — 蓄势·蓄光 */}
          <div className={'progress-glow-wrap ' + (entered ? ' visible' : '')}>
            <div className="progress-glow-card">
              {/* 首档奖励 */}
              <div className="progress-glow-reward">
                <span className="progress-glow-label">首档奖励</span>
                <span className="progress-glow-value">¥{curT.reward.replace('¥','')}</span>
              </div>

              {/* 装饰光带 — 横向扫过 */}
              <div className="progress-glow-sweep"/>

              {/* 激励文案 */}
              <div className="progress-glow-motive">
                报名并邀请 <em>{curThresh}</em> 人即可获得
              </div>

              {/* 进度条 + 名额 */}
              <div className="progress-glow-bar-row">
                <div className="progress-glow-bar-track">
                  <div className="progress-glow-bar-fill" style={{width: barW + '%'}}/>
                  {barW === 0 && <div className="progress-glow-bar-dot"/>}
                </div>
                <span className="progress-glow-bar-text">
                  获奖进度 <b>{prog.cur}</b> / {prog.total}
                </span>
              </div>
            </div>
          </div>

          {/* Reward Tiers — 纯信息列表 */}
          <div style={{margin:'0 20px 16px', opacity:entered?1:0, transform:entered?'translateY(0)':'translateY(8px)', transition:'opacity 0.5s cubic-bezier(0.16,1,0.3,1) 0.6s, transform 0.5s cubic-bezier(0.16,1,0.3,1) 0.6s'}}>
            <div style={{fontSize:10, color:'#A8A098', fontWeight:400, letterSpacing:'2px', marginBottom:12}}>奖励阶梯</div>
            {tiers.map((t,i)=>(
              <div key={t.t} style={{
                position:'relative',
                display:'flex',
                alignItems:'baseline',
                padding:'6px 0',
              }}>
                {t.cur && <div style={{
                  position:'absolute',left:0,right:0,top:0,bottom:0,
                  background:'rgba(255,183,77,0.04)',
                  borderRadius:0,
                  pointerEvents:'none',
                  animation:'tierHighlight 4s ease-in-out infinite',
                }}/>}
                <div style={{
                  width:28,flexShrink:0,
                  fontFamily:'"Noto Serif SC",serif',
                  fontSize:14,fontWeight:400,
                  color: t.done ? '#6B8F71' : (t.cur ? 'rgba(139,115,85,0.6)' : 'rgba(139,115,85,0.2)'),
                  transition:'color 0.6s ease',
                }}>
                  {t.done
                    ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6B8F71" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20,6 9,17 4,12"/>
                      </svg>
                    : t.t}
                </div>
                <span style={{
                  flex:1,
                  fontSize:13,
                  color: t.done ? '#6B8F71' : '#8B7355',
                  fontWeight:400,
                  opacity: t.done ? 0.7 : 1,
                  textDecoration: t.done ? 'line-through' : 'none',
                }}>{t.cond}</span>
                <span style={{
                  fontFamily:'"Inter","Noto Serif SC",sans-serif',
                  fontSize:16,
                  fontWeight:500,
                  color: t.done ? '#6B8F71' : (t.cur ? '#8B7355' : '#C4BDB4'),
                  letterSpacing:'-0.3px',
                }}>{t.reward}</span>
              </div>
            ))}
          </div>

          {/* Rules — 展开动画 */}
          <div style={{
            margin:'0 20px 24px',
            opacity:entered?1:0, transform:entered?'translateY(0)':'translateY(8px)',
            transition:'opacity 0.5s cubic-bezier(0.16,1,0.3,1) 1.2s, transform 0.5s cubic-bezier(0.16,1,0.3,1) 1.2s',
          }}>
            <div onClick={()=>setExp(!exp)} style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'12px 0', cursor:'pointer',
              borderTop:'1px solid rgba(232,228,220,0.6)',
            }}>
              <span style={{fontSize:10, color:'#A8A098', fontWeight:400, letterSpacing:'2px'}}>活动规则</span>
              <div style={{
                width:20,height:20,borderRadius:'50%',border:'1px solid #D8D3CB',
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)',transform:exp?'rotate(180deg)':'none',
              }}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#A8A098" strokeWidth="2.5"><polyline points="6,9 12,15 18,9"/></svg>
              </div>
            </div>
            {exp && <div style={{fontSize:12, color:'#8B7355', lineHeight:1.9, paddingTop:8, paddingLeft:4}}>
              {rules.map((r,i)=><div key={i} style={{
                paddingBottom:4,
                animation:`footerFadeUp 0.3s cubic-bezier(0.16,1,0.3,1) ${i*0.05}s both`,
              }}>{r}</div>)}
            </div>}
          </div>

          {/* Footer — Takram three-column */}
          <div style={{
            margin:'0 20px 20px',
            display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'8px 0',borderTop:'1px solid rgba(232,228,220,0.4)',
            opacity:entered?1:0,
            transition:'opacity 0.5s cubic-bezier(0.16,1,0.3,1) 1.4s',
          }}>
