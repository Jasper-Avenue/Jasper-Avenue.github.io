<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单详情</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e8e8;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; padding: 40px 20px;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
}
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }

/* ── Frame ── */
.frame {
  display: inline-block; padding: 3px; background: #1a1a1a;
  border-radius: 50px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); position: relative;
}
.screen {
  position: relative; width: 393px; height: 852px;
  border-radius: 48px; overflow: hidden; background: #F7F8FA;
}

/* ── Status Bar ── */
.status-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; font-size: 16px; font-weight: 600; color: #000;
  z-index: 20; pointer-events: none;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.signal-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
.signal-bars span { width: 3px; background: #000; border-radius: 1px; }
.signal-bars span:nth-child(1) { height: 3px; }
.signal-bars span:nth-child(2) { height: 6px; }
.signal-bars span:nth-child(3) { height: 9px; }
.signal-bars span:nth-child(4) { height: 11px; }
.battery { width: 26px; height: 12px; border: 1.5px solid #000; border-radius: 3px; padding: 1px; position: relative; opacity: 0.8; }
.battery::after { content: ''; position: absolute; top: 3px; right: -3px; width: 2px; height: 6px; background: #000; border-radius: 0 1px 1px 0; }
.battery-fill { width: 70%; height: 100%; background: #000; border-radius: 1px; }
.dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 124px; height: 36px; background: #000; border-radius: 999px; z-index: 30; }

/* ── Nav ── */
.merged-nav {
  position: absolute; top: 54px; left: 0; right: 0; height: 44px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 15; background: #fff;
}
.nav-left { display: flex; align-items: center; width: 100px; cursor: pointer; }
.nav-back { width: 20px; height: 20px; flex-shrink: 0; }
.nav-center {
  font-size: 17px; font-weight: 600; color: #000;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-right { display: flex; align-items: center; justify-content: flex-end; width: 100px; }
.wechat-pill { display: flex; align-items: center; background: rgba(255,255,255,0.92); border-radius: 20px; padding: 6px 4px; backdrop-filter: blur(10px); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.wechat-more { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; }
.wechat-divider { width: 1px; height: 14px; background: rgba(0,0,0,0.08); flex-shrink: 0; }
.wechat-close { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; }

/* ── Page Content ── */
.page-content {
  position: absolute; top: 98px; left: 0; right: 0; bottom: 0;
  overflow-y: auto; overflow-x: hidden;
  background: #F7F8FA;
  padding-bottom: 120px;
}

/* ── Status Banner (pending only) ── */
.status-banner {
  margin: 12px 16px 0;
  background: linear-gradient(135deg, #FFF7ED 0%, #FFFBF5 100%);
  border-radius: 12px;
  padding: 14px 16px;
  display: none;
  align-items: center;
  gap: 10px;
}
.status-banner.show { display: flex; }
.status-banner-icon {
  width: 32px; height: 32px; flex-shrink: 0;
  background: #FFF3E0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.status-banner-icon.pulse { animation: bannerPulse 2s ease-in-out infinite; }
@keyframes bannerPulse {
  0%, 100% { background: #FFF3E0; }
  50% { background: #FFE0B2; }
}
.status-banner-text { flex: 1; }
.status-banner-title { font-size: 14px; font-weight: 600; color: #E65100; margin-bottom: 2px; }
.status-banner-sub { font-size: 12px; color: #F57C00; }
.countdown-digits {
  font-size: 18px; font-weight: 700; color: #E65100;
  font-variant-numeric: tabular-nums; letter-spacing: 1px;
  background: #fff; padding: 4px 10px; border-radius: 8px;
  box-shadow: 0 1px 3px rgba(230,81,0,0.1);
}

/* ── Order Card ── */
.order-card {
  margin: 12px 16px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

/* Card header with status */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
}
.card-header-title {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}
.status-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}
.status-tag.pending { background: #FFF3E0; color: #E65100; }
.status-tag.paid { background: #E8F5E9; color: #2E7D32; }
.status-tag.cancelled { background: #F5F5F5; color: #9E9E9E; }

/* Info rows */
.info-section {
  padding: 0 16px 16px;
}
.info-row {
  display: flex;
  align-items: flex-start;
  padding: 11px 0;
  min-height: 42px;
}
.info-row + .info-row {
  border-top: 0.5px solid #F0F0F0;
}
.info-label {
  font-size: 13px;
  color: #999;
  width: 72px;
  flex-shrink: 0;
  line-height: 1.5;
}
.info-value {
  flex: 1;
  font-size: 13px;
  color: #333;
  line-height: 1.5;
  text-align: right;
  word-break: break-all;
}
.info-value.price {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a1a;
  font-variant-numeric: tabular-nums;
}
.info-value.price .yen {
  font-size: 13px;
  font-weight: 500;
  margin-right: 1px;
}

/* Order ID copyable */
.info-value.copyable {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  cursor: pointer;
  color: #666;
  transition: color 0.15s;
}
.info-value.copyable:active { color: #E65100; }
.copy-icon {
  width: 14px; height: 14px; flex-shrink: 0; opacity: 0.4;
  transition: opacity 0.15s;
}
.info-value.copyable:active .copy-icon { opacity: 1; }

/* Payment icon */
.pay-icon-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
}
.pay-icon-wrap img { width: 18px; height: 18px; }
.pay-icon-wrap span { font-size: 13px; color: #333; }

/* ── Bottom Action Bar (pending only) ── */
.bottom-bar {
  position: absolute;
  bottom: 34px;
  left: 0; right: 0;
  height: 72px;
  background: #fff;
  border-top: 0.5px solid #eee;
  display: none;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 10;
}
.bottom-bar.show { display: flex; }

.btn {
  height: 44px;
  border: none;
  border-radius: 22px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.btn:active { transform: scale(0.97); }

.btn-cancel {
  flex: 1;
  background: #F5F5F5;
  color: #666;
}
.btn-pay {
  flex: 2;
  background: linear-gradient(135deg, #FF6B35, #FF4500);
  color: #fff;
  box-shadow: 0 4px 12px rgba(255,69,0,0.25);
}

/* ── Toast ── */
.toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.78);
  color: #fff;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  z-index: 200;
  display: none;
  text-align: center;
  max-width: 240px;
}
.toast.show { display: block; animation: toastIn 0.2s ease; }
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* ── Modal ── */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  background: #fff;
  border-radius: 20px;
  width: 280px;
  padding: 28px 24px 20px;
  text-align: center;
  animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-icon {
  width: 48px; height: 48px;
  margin: 0 auto 16px;
  background: #FFF3E0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.modal-title { font-size: 17px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
.modal-desc { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 24px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1;
  height: 42px;
  border: none;
  border-radius: 21px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.modal-btn:active { transform: scale(0.96); }
.modal-btn.secondary { background: #F5F5F5; color: #888; }
.modal-btn.primary { background: #1a1a1a; color: #fff; }

/* ── Empty State ── */
.empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 120px 40px;
}
.empty-state.show { display: flex; }
.empty-icon { width: 100px; height: 80px; margin-bottom: 16px; }
.empty-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 6px; }
.empty-desc { font-size: 13px; color: #999; }
.empty-retry {
  margin-top: 20px;
  padding: 8px 24px;
  background: #FF6B35;
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
}
.empty-retry:active { opacity: 0.8; }

/* ── Home Indicator ── */
.home-indicator {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 140px; height: 5px; background: rgba(0,0,0,0.3); border-radius: 999px; z-index: 10;
}
</style>
</head>
<body>

<div class="frame">
  <div class="screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span>3:07</span>
      <div class="status-icons">
        <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="#000"/>
          <path d="M3 7.5a7 7 0 0110 0" stroke="#000" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M1 4.5a11 11 0 0114 0" stroke="#000" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>
    <div class="dynamic-island"></div>

    <!-- Nav -->
    <div class="merged-nav">
      <div class="nav-left" id="backBtn">
        <svg class="nav-back" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2">
          <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="nav-center">订单详情</div>
      <div class="nav-right">
        <div class="wechat-pill">
          <div class="wechat-more"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2" fill="#333"/><circle cx="12" cy="12" r="2" fill="#333"/><circle cx="18" cy="12" r="2" fill="#333"/></svg></div>
          <div class="wechat-divider"></div>
          <div class="wechat-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5" fill="#333" stroke="none"/></svg></div>
        </div>
      </div>
    </div>

    <!-- Page Content -->
    <div class="page-content" id="pageContent">

      <!-- Pending Status Banner -->
      <div class="status-banner" id="statusBanner">
        <div class="status-banner-icon pulse">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="#E65100" stroke-width="1.2"/>
            <path d="M9 5v4l2.5 1.5" stroke="#E65100" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="status-banner-text">
          <div class="status-banner-title">请尽快完成支付</div>
          <div class="status-banner-sub">超时订单将自动取消</div>
        </div>
        <div class="countdown-digits" id="countdownDigits">05:00</div>
      </div>

      <!-- Order Info Card -->
      <div class="order-card" id="orderCard">
        <!-- Header: title + status tag -->
        <div class="card-header">
          <span class="card-header-title">订单信息</span>
          <span class="status-tag" id="statusTag"></span>
        </div>

        <!-- Info rows -->
        <div class="info-section" id="infoSection">
          <!-- Order ID (copyable) -->
          <div class="info-row">
            <span class="info-label">订单编号</span>
            <span class="info-value copyable" id="orderIdValue" onclick="copyOrderId()">
              <span id="orderIdText"></span>
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </span>
          </div>

          <!-- Activity + Period -->
          <div class="info-row">
            <span class="info-label">活动名称</span>
            <span class="info-value" id="activityName"></span>
          </div>

          <!-- Product -->
          <div class="info-row">
            <span class="info-label">商品名称</span>
            <span class="info-value" id="productName"></span>
          </div>

          <!-- Amount -->
          <div class="info-row">
            <span class="info-label">订单金额</span>
            <span class="info-value price" id="orderAmount"></span>
          </div>

          <!-- Phone -->
          <div class="info-row">
            <span class="info-label">接单手机号</span>
            <span class="info-value" id="phoneValue"></span>
          </div>

          <!-- Payment method (hidden for pending per PRD 6.2) -->
          <div class="info-row" id="paymentRow" style="display:none;">
            <span class="info-label">支付方式</span>
            <span class="info-value">
              <div class="pay-icon-wrap">
                <img src="../assets/支付-_微信支付-copy.svg" alt="微信支付">
                <span>微信支付</span>
              </div>
            </span>
          </div>

          <!-- Create time -->
          <div class="info-row">
            <span class="info-label">创建时间</span>
            <span class="info-value" id="createTime"></span>
          </div>

          <!-- Cancel time (cancelled only) -->
          <div class="info-row" id="cancelTimeRow" style="display:none;">
            <span class="info-label">取消时间</span>
            <span class="info-value" id="cancelTime"></span>
          </div>

          <!-- Pay time (paid only) -->
          <div class="info-row" id="payTimeRow" style="display:none;">
            <span class="info-label">支付时间</span>
            <span class="info-value" id="payTime"></span>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <svg class="empty-icon" viewBox="0 0 100 80" fill="none">
          <rect x="15" y="10" width="70" height="55" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
          <path d="M35 10V6c0-2 1.5-3 3-3h24c1.5 0 3 1 3 3v4" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="50" cy="40" r="10" fill="#FFF3E0" stroke="#FF6B35" stroke-width="1"/>
          <path d="M46 40h8M50 36v8" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div class="empty-title" id="emptyTitle">订单不存在</div>
        <div class="empty-desc" id="emptyDesc">该订单可能已被删除或过期</div>
        <button class="empty-retry" id="emptyRetry" style="display:none;" onclick="window.location.href='09-participation-record.html'">返回记录页</button>
      </div>
    </div>

    <!-- Bottom Action Bar (pending only) -->
    <div class="bottom-bar" id="bottomBar">
      <button class="btn btn-cancel" id="cancelBtn">取消</button>
      <button class="btn btn-pay" id="payBtn">去支付</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Cancel Modal -->
    <div class="modal-overlay" id="cancelModal">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E65100" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="modal-title">确认取消订单？</div>
        <div class="modal-desc">取消后将无法恢复<br>请确认是否取消</div>
        <div class="modal-btns">
          <button class="modal-btn secondary" onclick="closeModal()">我再想想</button>
          <button class="modal-btn primary" onclick="confirmCancel()">确认取消</button>
        </div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>

  </div>
</div>

<script>
(function () {
  // ─── Mock Order Data ─────────────────────────────────
  var orders = {
    'ORD202605100001': {
      orderId: 'ORD202605100001',
      activityName: '狂欢派对 - 第3期',
      productName: '1天免佣卡分享资格',
      amount: 9.90,
      phone: '13812345678',
      status: 'pending',
      createTime: '2026.05.10 14:30:22',
      cancelTime: null,
      payTime: null,
      deadline: Date.now() + 272000 // ~4:32 remaining
    },
    'ORD202604150002': {
      orderId: 'ORD202604150002',
      activityName: '欢乐购 - 第2期',
      productName: '1天免佣卡分享资格',
      amount: 12.00,
      phone: '13812345678',
      status: 'paid',
      createTime: '2026.04.15 10:28:15',
      cancelTime: null,
      payTime: '2026.04.15 10:30:22'
    },
    'ORD202604120003': {
      orderId: 'ORD202604120003',
      activityName: '狂欢派对 - 第2期',
      productName: '1天免佣卡分享资格',
      amount: 9.90,
      phone: '13812345678',
      status: 'paid',
      createTime: '2026.04.12 08:12:30',
      cancelTime: null,
      payTime: '2026.04.12 08:15:40'
    },
    'ORD202604080004': {
      orderId: 'ORD202604080004',
      activityName: '美食节 - 第1期',
      productName: '1天免佣卡分享资格',
      amount: 5.00,
      phone: '13812345678',
      status: 'cancelled',
      createTime: '2026.04.08 14:20:05',
      cancelTime: '2026.04.08 14:22:05',
      payTime: null
    },
    'ORD202603250005': {
      orderId: 'ORD202603250005',
      activityName: '春日特惠 - 第1期',
      productName: '1天免佣卡分享资格',
      amount: 9.90,
      phone: '13812345678',
      status: 'paid',
      createTime: '2026.03.25 16:42:08',
      cancelTime: null,
      payTime: '2026.03.25 16:45:12'
    }
  };

  var statusMap = {
    pending: { label: '待支付', cls: 'pending' },
    paid: { label: '已支付', cls: 'paid' },
    cancelled: { label: '已取消', cls: 'cancelled' }
  };

  // ─── Parse URL ──────────────────────────────────────
  function getParam(name) {
    var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  var orderId = getParam('orderId');
  var order = orders[orderId];

  // ─── Empty State ────────────────────────────────────
  if (!order) {
    document.getElementById('orderCard').style.display = 'none';
    document.getElementById('statusBanner').style.display = 'none';
    document.getElementById('emptyState').classList.add('show');
    document.getElementById('emptyRetry').style.display = 'inline-block';
    return;
  }

  var st = statusMap[order.status];

  // ─── Populate Fields ────────────────────────────────
  document.getElementById('orderIdText').textContent = order.orderId;
  document.getElementById('activityName').textContent = order.activityName;
  document.getElementById('productName').textContent = order.productName;
  document.getElementById('orderAmount').innerHTML = '<span class="yen">¥</span>' + order.amount.toFixed(2);

  document.getElementById('phoneValue').textContent = order.phone;

  // Status tag (header)
  var statusTag = document.getElementById('statusTag');
  statusTag.textContent = st.label;
  statusTag.className = 'status-tag ' + st.cls;

  // Create time
  document.getElementById('createTime').textContent = order.createTime;

  // Payment method: hidden for pending/cancelled (PRD 6.2: 未产生实际支付状态下不展示)
  if (order.status === 'paid') {
    document.getElementById('paymentRow').style.display = 'flex';
  }

  // Cancel time row
  if (order.status === 'cancelled' && order.cancelTime) {
    document.getElementById('cancelTimeRow').style.display = 'flex';
    document.getElementById('cancelTime').textContent = order.cancelTime;
  }

  // Pay time row
  if (order.status === 'paid' && order.payTime) {
    document.getElementById('payTimeRow').style.display = 'flex';
    document.getElementById('payTime').textContent = order.payTime;
  }

  // ─── Pending: countdown + action bar ───────────────
  var countdownTimer = null;
  if (order.status === 'pending') {
    document.getElementById('statusBanner').classList.add('show');
    document.getElementById('bottomBar').classList.add('show');

    if (order.deadline) {
      function tick() {
        var diff = order.deadline - Date.now();
        if (diff <= 0) {
          document.getElementById('countdownDigits').textContent = '00:00';
          clearInterval(countdownTimer);
          // Auto-cancel
          order.status = 'cancelled';
          showToast('订单已超时，已自动取消');
          setTimeout(function () { location.reload(); }, 1500);
          return;
        }
        var m = Math.floor(diff / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        document.getElementById('countdownDigits').textContent =
          String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }
      tick();
      countdownTimer = setInterval(tick, 1000);
    }
  }

  // ─── Cancel Modal ───────────────────────────────────
  document.getElementById('cancelBtn').addEventListener('click', function () {
    document.getElementById('cancelModal').classList.add('show');
  });

  window.closeModal = function () {
    document.getElementById('cancelModal').classList.remove('show');
  };

  // Click overlay to close
  document.getElementById('cancelModal').addEventListener('click', function (e) {
    if (e.target === this) window.closeModal();
  });

  window.confirmCancel = function () {
    window.closeModal();
    var now = new Date();
    order.status = 'cancelled';
    order.cancelTime = now.getFullYear() + '.' +
      String(now.getMonth() + 1).padStart(2, '0') + '.' +
      String(now.getDate()).padStart(2, '0') + ' ' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0') + ':' +
      String(now.getSeconds()).padStart(2, '0');
    order.deadline = null;
    if (countdownTimer) clearInterval(countdownTimer);
    showToast('订单已取消');
    setTimeout(function () { location.reload(); }, 1000);
  };

  // ─── Pay Button ─────────────────────────────────────
  document.getElementById('payBtn').addEventListener('click', function () {
    window.location.href = '05-purchase-confirm.html?orderId=' + order.orderId;
  });

  // ─── Back ───────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var fromParam = params.get('from') || '';
  document.getElementById('backBtn').addEventListener('click', function () {
    window.location.href = '09-participation-record.html' + fromParam;
  });

  // ─── Copy Order ID ─────────────────────────────────
  window.copyOrderId = function () {
    var text = document.getElementById('orderIdText').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function () {
        showToast('已复制订单编号');
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('已复制订单编号');
    }
  };

  // ─── Toast ──────────────────────────────────────────
  var toastTimer = null;
  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toast.classList.remove('show');
    }, 2000);
  }
  window.showToast = showToast;

})();
</script>

</body>
</html>
