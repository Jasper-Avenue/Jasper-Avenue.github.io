<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参与记录页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, "PingFang SC", "SF Pro Text", sans-serif;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }

/* ── Device Frame ── */
.device {
  position: relative;
  width: 393px;
  height: 852px;
  border-radius: 50px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 0 0 3px #2a2a2a, 0 20px 60px rgba(0,0,0,0.4);
}

/* Status Bar */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  z-index: 100;
  pointer-events: none;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.signal-bars { display: flex; align-items: flex-end; gap: 1.5px; height: 12px; }
.signal-bars span { width: 3px; background: #1a1a1a; border-radius: 1px; }
.signal-bars span:nth-child(1) { height: 3px; }
.signal-bars span:nth-child(2) { height: 5px; }
.signal-bars span:nth-child(3) { height: 8px; }
.signal-bars span:nth-child(4) { height: 11px; }
.battery {
  width: 25px; height: 12px;
  border: 1.5px solid #1a1a1a;
  border-radius: 3px;
  padding: 1px;
  position: relative;
}
.battery::after {
  content: '';
  position: absolute;
  top: 3px; right: -3.5px;
  width: 2px; height: 5px;
  background: #1a1a1a;
  border-radius: 0 1px 1px 0;
}
.battery-fill { width: 75%; height: 100%; background: #1a1a1a; border-radius: 1px; }
.dynamic-island {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 35px;
  background: #000;
  border-radius: 20px;
  z-index: 101;
}

/* WeChat Capsule */
.wechat-capsule {
  position: absolute;
  top: 56px; right: 16px;
  z-index: 100;
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 6px 4px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}
.capsule-dot {
  display: flex;
  gap: 3px;
  align-items: center;
  padding: 0 8px;
}
.capsule-dot span {
  width: 4px; height: 4px;
  background: #666;
  border-radius: 50%;
}
.capsule-line {
  width: 0.5px;
  height: 16px;
  background: rgba(0,0,0,0.12);
}
.capsule-x {
  padding: 0 6px;
}

/* Nav Bar */
.nav-bar {
  position: absolute;
  top: 54px; left: 0; right: 0;
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  z-index: 50;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
}
.nav-back {
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 50%;
  transition: background 0.2s;
}
.nav-back:hover { background: rgba(0,0,0,0.04); }
.nav-back:active { background: rgba(0,0,0,0.08); }
.nav-title {
  flex: 1;
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  color: #1a1a1a;
  letter-spacing: 0.2px;
}
.nav-spacer { width: 36px; }

/* Content Area */
.content {
  position: absolute;
  top: 98px;
  left: 0; right: 0;
  bottom: 0;
  overflow-y: auto;
  background: #F2F3F5;
  padding: 16px;
  padding-bottom: 100px;
}

/* ── Section Header ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 2px;
}
.section-title {
  font-size: 13px;
  color: #999;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.section-count {
  font-size: 12px;
  color: #ccc;
}

/* ── Card ── */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.card:active {
  transform: scale(0.985);
}

.card-top {
  margin-bottom: 4px;
}
.card-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-top-divider {
  height: 0.5px;
  background: #F5F5F5;
  margin: 6px 0;
}
.card-create-time {
  font-size: 12px;
  color: #bbb;
  font-variant-numeric: tabular-nums;
  line-height: 1.4;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-create-time .label {
  color: #ccc;
  flex-shrink: 0;
}
.card-create-time .time {
  color: #999;
  font-variant-numeric: tabular-nums;
}
.card-activity {
  flex: 1;
  min-width: 0;
}
.order-id {
  font-size: 11px;
  color: #ccc;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.3px;
}
.card-name {
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  line-height: 1.5;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-period {
  font-size: 12px;
  color: #bbb;
  font-variant-numeric: tabular-nums;
  margin-top: 4px;
  line-height: 1.4;
}

/* Status Tags */
.tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 10px;
}
.tag-pending {
  background: #FFF3E8;
  color: #E8722A;
}
.tag-paid {
  background: #E8F7ED;
  color: #2A9D5C;
}
.tag-cancelled {
  background: #F5F5F5;
  color: #A8A8A8;
}
.tag-pending-reward {
  background: #FFF3E8;
  color: #E8722A;
}
.tag-issued {
  background: #E8F7ED;
  color: #2A9D5C;
}

/* Card Body */
.card-body {
  padding-top: 2px;
}
.info-row {
  display: flex;
  align-items: baseline;
  padding: 6px 0;
}
.info-row + .info-row {
  padding-top: 2px;
}
.info-label {
  font-size: 12px;
  color: #bbb;
  margin-right: 6px;
  flex-shrink: 0;
}
.info-label::after {
  content: ':';
}
.info-value {
  font-size: 13px;
  color: #333;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.info-value.price {
  color: #1a1a1a;
  font-weight: 700;
  font-size: 15px;
  font-variant-numeric: tabular-nums;
}
.info-value.reward-text {
  color: #E8722A;
  font-weight: 500;
}
.info-value.time-text {
  color: #bbb;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

/* Countdown */
.countdown-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 8px 10px;
  background: #FFFAF5;
  border-radius: 8px;
}
.countdown-icon {
  width: 14px; height: 14px;
  flex-shrink: 0;
}
.countdown-label {
  font-size: 12px;
  color: #ccc;
}
.countdown-time {
  font-size: 13px;
  font-weight: 700;
  color: #E8722A;
  font-variant-numeric: tabular-nums;
  margin-left: auto;
}
.countdown-time.pulse {
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Card Actions */
.card-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  justify-content: flex-end;
}
.btn {
  height: 36px;
  min-width: 64px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  transition: all 0.15s ease;
  letter-spacing: 0.2px;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-pay {
  background: #E8722A;
  color: #fff;
}
.btn-cancel {
  background: #F2F3F5;
  color: #888;
}
.btn-detail {
  background: #F2F3F5;
  color: #666;
  min-width: 56px;
}
.btn-detail svg {
  width: 12px; height: 12px;
  margin-left: 3px;
  transition: transform 0.2s;
}
.btn-detail:hover svg { transform: translateX(2px); }

/* Divider in card */
.card-divider {
  height: 0.5px;
  background: #F0F0F0;
  margin: 10px 0;
}

/* ── Empty State ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
}
.empty-illustration {
  width: 120px;
  height: 100px;
  margin-bottom: 20px;
}
.empty-label {
  font-size: 14px;
  color: #bbb;
  letter-spacing: 0.3px;
}

/* ── Bottom Capsule Tabs ── */
.bottom-capsule {
  position: absolute;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
}
.capsule {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 3px;
  box-shadow:
    0 4px 16px rgba(0,0,0,0.08),
    0 0 0 0.5px rgba(0,0,0,0.04);
  position: relative;
}
.capsule-track {
  position: absolute;
  top: 3px;
  left: 3px;
  width: calc(50% - 3px);
  height: calc(100% - 6px);
  background: #E8722A;
  border-radius: 17px;
  box-shadow: 0 2px 8px rgba(232,114,42,0.3);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: 0;
}
.capsule-btn {
  width: 80px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #999;
  font-weight: 500;
  cursor: pointer;
  position: relative;
  z-index: 1;
  transition: color 0.3s ease;
  letter-spacing: 0.5px;
  user-select: none;
  -webkit-user-select: none;
}
.capsule-btn.active {
  color: #fff;
  font-weight: 600;
}

/* Fog Overlay */
.fog {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 140px;
  background: linear-gradient(to top, #F2F3F5 0%, rgba(242,243,245,0.7) 40%, rgba(242,243,245,0) 100%);
  pointer-events: none;
  z-index: 45;
}

/* Home Indicator */
.home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 136px;
  height: 5px;
  background: rgba(0,0,0,0.2);
  border-radius: 3px;
  z-index: 100;
}

/* ── Modal ── */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-card {
  background: #fff;
  border-radius: 20px;
  width: 280px;
  padding: 28px 24px 20px;
  text-align: center;
  animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-icon {
  width: 48px; height: 48px;
  margin: 0 auto 16px;
  background: #FFF3E8;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-title {
  font-size: 17px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 8px;
}
.modal-desc {
  font-size: 14px;
  color: #888;
  line-height: 1.6;
  margin-bottom: 24px;
}
.modal-btns {
  display: flex;
  gap: 10px;
}
.modal-btn {
  flex: 1;
  height: 42px;
  border: none;
  border-radius: 21px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.modal-btn:active { transform: scale(0.96); }
.modal-btn.secondary {
  background: #F5F5F5;
  color: #888;
}
.modal-btn.primary {
  background: #1a1a1a;
  color: #fff;
}
</style>
</head>
<body>

<div class="device">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <div class="signal-bars">
        <span></span><span></span><span></span><span></span>
      </div>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="#1a1a1a"/>
        <path d="M3 7.5a7 7 0 0110 0" stroke="#1a1a1a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path d="M1 4.5a11 11 0 0114 0" stroke="#1a1a1a" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.6"/>
      </svg>
      <div class="battery"><div class="battery-fill"></div></div>
    </div>
  </div>

  <!-- Dynamic Island -->
  <div class="dynamic-island"></div>

  <!-- WeChat Capsule -->
  <div class="wechat-capsule">
    <div class="capsule-dot"><span></span><span></span><span></span></div>
    <div class="capsule-line"></div>
    <div class="capsule-x">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="8"/>
        <circle cx="12" cy="12" r="3" fill="#666" stroke="none"/>
      </svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <div class="nav-back">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="8 2 2 9 8 16"/>
      </svg>
    </div>
    <div class="nav-title">参与记录</div>
    <div class="nav-spacer"></div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Fog -->
  <div class="fog"></div>

  <!-- Bottom Capsule -->
  <div class="bottom-capsule">
    <div class="capsule">
      <div class="capsule-track" id="capsuleTrack"></div>
      <div class="capsule-btn active" id="tabOrders" onclick="switchTab('orders')">订单记录</div>
      <div class="capsule-btn" id="tabRewards" onclick="switchTab('rewards')">奖励记录</div>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

  <!-- Modal Container -->
  <div id="modalContainer"></div>
</div>

<script>
// ─── Data ────────────────────────────────────────────
const orders = [
  {
    id: 1,
    orderId: 'ORD202605100001',
    name: '狂欢派对 - 第3期',
    period: '2026.05.01 - 05.15',
    product: '1天免佣卡分享资格',
    price: 9.90,
    status: 'pending',
    deadline: Date.now() + 272000,
    createTime: '2026.05.10 14:30:22',
  },
  {
    id: 2,
    orderId: 'ORD202604150002',
    name: '欢乐购 - 第2期',
    period: '2026.04.15 - 04.30',
    product: '1天免佣卡分享资格',
    price: 12.00,
    status: 'paid',
    payTime: '2026.04.15 10:30:22',
    createTime: '2026.04.15 10:28:15',
  },
  {
    id: 3,
    orderId: 'ORD202604120003',
    name: '狂欢派对 - 第2期',
    period: '2026.04.01 - 04.15',
    product: '1天免佣卡分享资格',
    price: 9.90,
    status: 'paid',
    payTime: '2026.04.12 08:15:40',
    createTime: '2026.04.12 08:12:30',
  },
  {
    id: 4,
    orderId: 'ORD202604080004',
    name: '美食节 - 第1期',
    period: '2026.04.01 - 04.10',
    product: '1天免佣卡分享资格',
    price: 5.00,
    status: 'cancelled',
    cancelTime: '2026.04.08 14:22:05',
    createTime: '2026.04.08 14:20:05',
  },
  {
    id: 5,
    orderId: 'ORD202603250005',
    name: '春日特惠 - 第1期',
    period: '2026.03.15 - 03.31',
    product: '1天免佣卡分享资格',
    price: 9.90,
    status: 'paid',
    payTime: '2026.03.25 16:45:12',
    createTime: '2026.03.25 16:42:08',
  },
];

// Sort by createTime descending
orders.sort(function(a, b) {
  return (b.createTime || '').localeCompare(a.createTime || '');
});

const rewards = [
  {
    name: '狂欢派对 - 第3期',
    period: '2026.05.01 - 05.15',
    count: 3,
    reward: '返 ¥69.99 + ¥0.01 购卡资格',
    issueTime: '--',
    status: 'pending-reward',
  },
  {
    name: '欢乐购 - 第2期',
    period: '2026.04.15 - 04.30',
    count: 5,
    reward: '返 ¥99.00 + ¥0.01 购卡资格',
    issueTime: '2026.04.25 09:30:00',
    status: 'issued',
  },
  {
    name: '狂欢派对 - 第2期',
    period: '2026.04.01 - 04.15',
    count: 4,
    reward: '返 ¥69.99',
    issueTime: '2026.04.20 14:00:00',
    status: 'issued',
  },
  {
    name: '美食节 - 第1期',
    period: '2026.04.01 - 04.10',
    count: 2,
    reward: '返 ¥39.99',
    issueTime: '--',
    status: 'pending-reward',
  },
];

// ─── State ───────────────────────────────────────────
let activeTab = 'orders';
let cancelTarget = null;
let countdownTimer = null;

const statusMap = {
  pending: { label: '待支付', cls: 'tag-pending' },
  paid: { label: '已支付', cls: 'tag-paid' },
  cancelled: { label: '已取消', cls: 'tag-cancelled' },
};
const rewardStatusMap = {
  'pending-reward': { label: '待发放', cls: 'tag-pending-reward' },
  issued: { label: '已发放', cls: 'tag-issued' },
};

// ─── Render ─────────────────────────────────────────

function renderOrders() {
  const content = document.getElementById('content');
  if (orders.length === 0) {
    content.innerHTML = emptyState('orders');
    return;
  }

  let html = '<div class="section-header"><span class="section-title">全部订单</span><span class="section-count">共 ' + orders.length + ' 笔</span></div>';

  orders.forEach(function(order, idx) {
    const st = statusMap[order.status];
    html += '<div class="card" style="animation-delay:' + (idx * 0.05) + 's">';

    // Top: order ID + status, divider, create time
    html += '<div class="card-top">';
    html += '<div class="card-top-row">';
    html += '<span class="order-id">' + order.orderId + '</span>';
    html += '<span class="tag ' + st.cls + '">' + st.label + '</span>';
    html += '</div>';
    html += '<div class="card-top-divider"></div>';
    html += '<div class="card-create-time"><span class="label">创建时间</span><span class="time">' + (order.createTime || '--') + '</span></div>';
    html += '</div>';

    // Body
    html += '<div class="card-body">';
    html += '<div class="info-row"><span class="info-label">商品</span><span class="info-value">' + order.product + '</span></div>';
    html += '<div class="info-row"><span class="info-label">金额</span><span class="info-value price">¥' + order.price.toFixed(2) + '</span></div>';

    if (order.status === 'pending') {
      html += '<div class="countdown-bar">';
      html += '<svg class="countdown-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#E8722A" stroke-width="1.2"/><path d="M8 4.5V8l2.5 1.5" stroke="#E8722A" stroke-width="1.3" stroke-linecap="round"/></svg>';
      html += '<span class="countdown-label">支付剩余</span>';
      html += '<span class="countdown-time pulse" id="cd-' + order.id + '">--:--</span>';
      html += '</div>';
      html += '<div class="card-actions">';
      html += '<button class="btn btn-cancel" onclick="showCancelModal(' + order.id + ')">取消</button>';
      html += '<button class="btn btn-pay" onclick="window.location.href=\'10-order-detail.html?orderId=' + order.orderId + '&from=' + encodeURIComponent(window.location.search) + '\'">去支付</button>';
      html += '</div>';
    }

    if (order.status === 'paid') {
      html += '<div class="card-divider"></div>';
      html += '<div class="info-row"><span class="info-label">支付时间</span><span class="info-value time-text">' + order.payTime + '</span></div>';
      html += '<div class="card-actions">';
      html += '<button class="btn btn-detail" onclick="window.location.href=\'10-order-detail.html?orderId=' + order.orderId + '&from=' + encodeURIComponent(window.location.search) + '\'">查看<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>';
      html += '</div>';
    }

    if (order.status === 'cancelled') {
      html += '<div class="card-divider"></div>';
      html += '<div class="info-row"><span class="info-label">取消时间</span><span class="info-value time-text">' + order.cancelTime + '</span></div>';
      html += '<div class="card-actions">';
      html += '<button class="btn btn-detail" onclick="window.location.href=\'10-order-detail.html?orderId=' + order.orderId + '&from=' + encodeURIComponent(window.location.search) + '\'">查看<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>';
      html += '</div>';
    }

    html += '</div>';
    html += '</div>';
  });

  content.innerHTML = html;
  startCountdowns();
}

function renderRewards() {
  const content = document.getElementById('content');
  if (rewards.length === 0) {
    content.innerHTML = emptyState('rewards');
    return;
  }

  let html = '<div class="section-header"><span class="section-title">全部奖励</span><span class="section-count">共 ' + rewards.length + ' 笔</span></div>';

  rewards.forEach(function(r, idx) {
    const st = rewardStatusMap[r.status];
    html += '<div class="card" style="animation-delay:' + (idx * 0.05) + 's">';
    html += '<div class="card-top">';
    html += '<div class="card-activity">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between">';
    html += '<span class="card-name">' + r.name + '</span>';
    html += '<span class="tag ' + st.cls + '">' + st.label + '</span>';
    html += '</div>';
    html += '<span class="card-period">' + r.period + '</span>';
    html += '</div>';
    html += '</div>';

    html += '<div class="card-body">';
    html += '<div class="info-row"><span class="info-label">完成数</span><span class="info-value">' + r.count + ' 人</span></div>';
    html += '<div class="info-row"><span class="info-label">奖励</span><span class="info-value reward-text">' + r.reward + '</span></div>';
    html += '<div class="info-row"><span class="info-label">发放时间</span><span class="info-value time-text">' + r.issueTime + '</span></div>';
    html += '</div>';
    html += '</div>';
  });

  content.innerHTML = html;
}

// ─── Tab Switch ──────────────────────────────────────

function switchTab(tab) {
  activeTab = tab;
  const track = document.getElementById('capsuleTrack');
  const btnOrders = document.getElementById('tabOrders');
  const btnRewards = document.getElementById('tabRewards');

  if (tab === 'orders') {
    track.style.transform = 'translateX(0)';
    btnOrders.classList.add('active');
    btnRewards.classList.remove('active');
    renderOrders();
  } else {
    track.style.transform = 'translateX(100%)';
    btnRewards.classList.add('active');
    btnOrders.classList.remove('active');
    renderRewards();
  }
}

// ─── Countdown ───────────────────────────────────────

function startCountdowns() {
  if (countdownTimer) clearInterval(countdownTimer);

  const pendingOrders = orders.filter(function(o) { return o.status === 'pending' && o.deadline; });
  if (pendingOrders.length === 0) return;

  function tick() {
    pendingOrders.forEach(function(order) {
      const el = document.getElementById('cd-' + order.id);
      if (!el) return;
      const diff = order.deadline - Date.now();
      if (diff <= 0) {
        el.textContent = '00:00';
        return;
      }
      const m = Math.floor(diff / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    });
  }

  tick();
  countdownTimer = setInterval(tick, 1000);
}

// ─── Cancel Modal ────────────────────────────────────

function showCancelModal(orderId) {
  cancelTarget = orderId;
  const order = orders.find(function(o) { return o.id === orderId; });
  const container = document.getElementById('modalContainer');
  container.innerHTML =
    '<div class="modal-overlay" onclick="closeModal()">' +
      '<div class="modal-card" onclick="event.stopPropagation()">' +
        '<div class="modal-icon">' +
          '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E8722A" stroke-width="2" stroke-linecap="round">' +
            '<circle cx="12" cy="12" r="10"/>' +
            '<line x1="12" y1="8" x2="12" y2="12"/>' +
            '<line x1="12" y1="16" x2="12.01" y2="16"/>' +
          '</svg>' +
        '</div>' +
        '<div class="modal-title">确认取消订单？</div>' +
        '<div class="modal-desc">取消后将无法恢复<br>请确认是否取消</div>' +
        '<div class="modal-btns">' +
          '<button class="modal-btn secondary" onclick="closeModal()">我再想想</button>' +
          '<button class="modal-btn primary" onclick="confirmCancel()">确认取消</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function closeModal() {
  cancelTarget = null;
  document.getElementById('modalContainer').innerHTML = '';
}

function confirmCancel() {
  if (!cancelTarget) return;
  const order = orders.find(function(o) { return o.id === cancelTarget; });
  if (order) {
    const now = new Date();
    order.status = 'cancelled';
    order.cancelTime = now.getFullYear() + '.' +
      String(now.getMonth()+1).padStart(2,'0') + '.' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');
    order.deadline = null;
  }
  closeModal();
  renderOrders();
}

});

renderOrders();
</script>
