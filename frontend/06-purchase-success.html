<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 6 · 购买成功页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e8e8;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; padding: 40px 20px;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
}
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }

/* ── Frame (from existing project, exact copy) ── */
.frame {
  display: inline-block; padding: 3px; background: #1a1a1a;
  border-radius: 50px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); position: relative;
}
.screen {
  position: relative; width: 393px; height: 852px;
  border-radius: 48px; overflow: hidden; background: #fff;
}
.status-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; font-size: 16px; font-weight: 600; color: #000;
  z-index: 20; pointer-events: none; font-family: -apple-system, "SF Pro Text", sans-serif;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.signal-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
.signal-bars span { width: 3px; background: #000; border-radius: 1px; }
.signal-bars span:nth-child(1) { height: 3px; }
.signal-bars span:nth-child(2) { height: 6px; }
.signal-bars span:nth-child(3) { height: 9px; }
.signal-bars span:nth-child(4) { height: 11px; }
.battery { width: 26px; height: 12px; border: 1.5px solid #000; border-radius: 3px; padding: 1px; position: relative; opacity: 0.8; }
.battery::after { content: ''; position: absolute; top: 3px; right: -3px; width: 2px; height: 6px; background: #000; border-radius: 0 1px 1px 0; }
.battery-fill { width: 70%; height: 100%; background: #000; border-radius: 1px; }
.dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 124px; height: 36px; background: #000; border-radius: 999px; z-index: 30; }

/* ── Nav: back + wechat capsule ── */
.merged-nav {
  position: absolute; top: 54px; left: 0; right: 0; height: 44px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 15; background: #fff;
}
.nav-left { display: flex; align-items: center; position: relative; width: 100px; cursor: pointer; }
.nav-back { width: 20px; height: 20px; flex-shrink: 0; }
.nav-right { display: flex; align-items: center; justify-content: flex-end; width: 100px; }
.wechat-pill { display: flex; align-items: center; background: rgba(255,255,255,0.92); border-radius: 20px; padding: 6px 4px; backdrop-filter: blur(10px); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.wechat-more { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; }
.wechat-divider { width: 1px; height: 14px; background: rgba(0,0,0,0.08); flex-shrink: 0; }
.wechat-close { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; }

/* ── Page Content ── */
.page-content {
  position: absolute; top: 98px; left: 0; right: 0; bottom: 34px;
  overflow-y: auto; overflow-x: hidden;
  background: linear-gradient(180deg, #FFFBF0 0%, #FFF8E7 30%, #FFFFFF 60%);
}

/* ── Success Hero Area ── */
.success-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 32px;
  position: relative;
}

/* Glow ring behind success badge */
.success-badge-wrap {
  position: relative;
  margin-bottom: 28px;
}
.success-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 110px; height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,215,0,0.25) 0%, transparent 70%);
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
}

/* Success badge: golden circle + inner check */
.success-badge {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFD700, #FFA726);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  animation: badgePop 0.5s ease-out;
  box-shadow: 0 6px 20px rgba(255,167,38,0.35);
}
@keyframes badgePop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

/* Golden ribbon bow on top of badge */
.badge-bow {
  position: absolute;
  top: -6px; right: -5px;
  width: 22px; height: 22px;
  z-index: 5;
}
.bow-loop {
  position: absolute;
  width: 11px; height: 14px;
  background: #FF6B35;
  border-radius: 50%;
}
.bow-loop.left { left: 0; transform: rotate(-20deg); }
.bow-loop.right { right: 0; transform: rotate(20deg); }
.bow-center {
  position: absolute;
  width: 6px; height: 6px;
  background: #E65100;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

/* Checkmark inside badge */
.badge-check {
  width: 40px; height: 40px;
}
.badge-check path {
  stroke: #fff;
  stroke-width: 3.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 50;
  stroke-dashoffset: 50;
  animation: checkDraw 0.5s ease 0.35s forwards;
}
@keyframes checkDraw {
  to { stroke-dashoffset: 0; }
}

/* Sparkle stars around badge */
.sparkle-star {
  position: absolute;
  font-size: 16px;
  color: #FFD54F;
  opacity: 0;
  animation: sparkleIn 0.4s ease forwards;
}
.sparkle-star.s1 { top: -4px; left: 6px; animation-delay: 0.5s; }
.sparkle-star.s2 { top: 10px; right: -10px; animation-delay: 0.65s; }
.sparkle-star.s3 { bottom: 2px; left: -8px; animation-delay: 0.8s; }
@keyframes sparkleIn {
  0% { transform: scale(0) rotate(0deg); opacity: 0; }
  100% { transform: scale(1) rotate(180deg); opacity: 1; }
}

/* Poster image card */
.success-poster {
  margin: 0 24px 20px;
  animation: fadeUp 0.5s ease 0.55s both;
}
.success-poster img {
  width: 100%;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(255,107,53,0.15);
  display: block;
}

/* Title */
.success-title {
  font-size: 22px;
  font-weight: 800;
  color: #333;
  margin: 0 auto 8px;
  padding: 0;
  width: 100%;
  max-width: 345px;
  animation: fadeUpTitle 0.4s ease 0.25s both;
  letter-spacing: 0.5px;
  text-align: center;
}
.success-subtitle {
  font-size: 14px;
  color: #999;
  margin: 0 auto;
  padding: 0;
  width: 100%;
  max-width: 260px;
  animation: fadeUp 0.4s ease 0.4s both;
  text-align: center;
}
@keyframes fadeUp {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fadeUpTitle {
  from { transform: translateY(10px) translateX(10px); opacity: 0; }
  to { transform: translateY(0) translateX(10px); opacity: 1; }
}

/* ── Order Summary Card ── */
.order-summary {
  margin: 0 16px 24px;
  background: #fff;
  border-radius: 12px;
  padding: 16px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  animation: fadeUp 0.4s ease 0.5s both;
}
.summary-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}
.summary-row + .summary-row {
  border-top: 1px solid #f5f0e8;
}
.summary-label {
  font-size: 14px;
  color: #999;
}
.summary-value {
  font-size: 14px;
  color: #333;
  font-weight: 600;
}
.summary-value.price {
  color: #FF6B35;
  font-size: 18px;
  font-weight: 800;
}
.summary-value.price .yen {
  font-size: 13px;
  font-weight: 600;
}
.summary-status {
  display: inline-block;
  font-size: 12px;
  color: #52C41A;
  background: rgba(82,196,26,0.08);
  padding: 2px 10px;
  border-radius: 12px;
}

/* ── Bottom Action Area ── */
.action-area {
  margin: 0 16px 34px;
  animation: fadeUp 0.4s ease 0.6s both;
}

.action-primary {
  width: 100%;
  height: 48px;
  background: linear-gradient(135deg, #FF8C00, #FF6B35);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 24px;
  cursor: pointer;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 12px rgba(255,107,53,0.3);
  transition: opacity 0.2s ease;
  margin-top: 12px;
}
.action-primary:active { opacity: 0.85; }

.action-secondary {
  width: 100%;
  height: 44px;
  background: transparent;
  color: #999;
  font-size: 14px;
  border: none;
  cursor: pointer;
  margin-top: 8px;
  transition: color 0.2s ease;
}
.action-secondary:active { color: #666; }

/* ── Confetti ── */
.confetti-wrap {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; overflow: hidden;
}
.confetti {
  position: absolute;
  border-radius: 2px;
  opacity: 0;
  animation: confettiFall 1.5s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-30px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(500px) rotate(720deg); opacity: 0; }
}

/* ── Home Indicator ── */
.home-indicator {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 140px; height: 5px; background: rgba(0,0,0,0.3); border-radius: 999px; z-index: 10;
}
</style>
</head>
<body>

<div class="frame">
  <div class="screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span>3:07</span>
      <div class="status-icons">
        <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="#000"/>
          <path d="M3 7.5a7 7 0 0110 0" stroke="#000" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M1 4.5a11 11 0 0114 0" stroke="#000" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>
    <div class="dynamic-island"></div>

    <!-- Nav -->
    <div class="merged-nav">
      <div class="nav-left">
        <svg class="nav-back" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2">
          <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="nav-right">
        <div class="wechat-pill">
          <div class="wechat-more"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2" fill="#333"/><circle cx="12" cy="12" r="2" fill="#333"/><circle cx="18" cy="12" r="2" fill="#333"/></svg></div>
          <div class="wechat-divider"></div>
          <div class="wechat-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5" fill="#333" stroke="none"/></svg></div>
        </div>
      </div>
    </div>

    <!-- Page Content -->
    <div class="page-content">

      <!-- Confetti -->
      <div class="confetti-wrap" id="confettiWrap"></div>

      <!-- Success Hero -->
      <div class="success-hero">
        <!-- Poster -->
        <div class="success-poster">
          <img src="../assets/jimeng-2026-05-11-4710-仅提取参考图暖橙色3D卡通活泼营销风格，文案保留：主标题'免佣卡限时抢 邀请好友....png" alt="活动海报" />
        </div>

        <div class="success-badge-wrap">
          <div class="success-glow"></div>
          <div class="success-badge">
            <!-- Ribbon bow decoration -->
            <div class="badge-bow">
              <div class="bow-loop left"></div>
              <div class="bow-loop right"></div>
              <div class="bow-center"></div>
            </div>
            <!-- Checkmark -->
            <svg class="badge-check" viewBox="0 0 44 44">
              <path d="M10 22l10 10 16-16"/>
            </svg>
          </div>
          <!-- Sparkle stars -->
          <span class="sparkle-star s1">✦</span>
          <span class="sparkle-star s2">✦</span>
          <span class="sparkle-star s3">✦</span>
        </div>

        <div class="success-title">恭喜获得分享资格！</div>
        <div class="success-subtitle" style="animation: fadeUp 0.4s ease 0.55s both;">支付成功，快去邀请好友吧</div>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <div class="summary-row">
          <span class="summary-label">商品名称</span>
          <span class="summary-value">1天免佣卡分享资格</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">订单金额</span>
          <span class="summary-value price"><span class="yen">¥</span>69.99</span>
        </div>
      </div>

      <!-- Bottom Action Area -->
      <div class="action-area">
        <button class="action-primary" id="shareBtn">立即去分享</button>
        <button class="action-secondary" id="laterBtn">稍后再说</button>
      </div>

    </div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>

  </div>
</div>

<script>
(function () {
  var shareBtn = document.getElementById('shareBtn');
  var laterBtn = document.getElementById('laterBtn');
  var confettiWrap = document.getElementById('confettiWrap');

  shareBtn.addEventListener('click', function () {
    window.location.href = 'inprogress-bought/index.html';
  });

  laterBtn.addEventListener('click', function () {
    window.location.href = 'index.html';
  });

  // Confetti particles matching warm orange palette
  var colors = ['#FF8C00', '#FFD700', '#FF6B35', '#FFE44D', '#FFB347', '#FF4500'];
  for (var i = 0; i < 24; i++) {
    var dot = document.createElement('div');
    dot.className = 'confetti';
    dot.style.left = Math.random() * 100 + '%';
    dot.style.top = (Math.random() * 30 - 10) + '%';
    dot.style.background = colors[Math.floor(Math.random() * colors.length)];
    dot.style.animationDelay = (Math.random() * 0.8) + 's';
    dot.style.animationDuration = (1 + Math.random() * 1) + 's';
    dot.style.width = (4 + Math.random() * 6) + 'px';
    dot.style.height = (4 + Math.random() * 10) + 'px';
    confettiWrap.appendChild(dot);
  }
})();
</script>

</body>
</html>
