<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 5 · 购买确认页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e8e8;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; padding: 40px 20px;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
}
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }

/* ── Frame ── */
.frame {
  display: inline-block; padding: 3px; background: #1a1a1a;
  border-radius: 50px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); position: relative;
}
.screen {
  position: relative; width: 393px; height: 852px;
  border-radius: 48px; overflow: hidden; background: #F7F8FA;
}

/* ── Status Bar ── */
.status-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; font-size: 16px; font-weight: 600; color: #000;
  z-index: 20; pointer-events: none;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.signal-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
.signal-bars span { width: 3px; background: #000; border-radius: 1px; }
.signal-bars span:nth-child(1) { height: 3px; }
.signal-bars span:nth-child(2) { height: 6px; }
.signal-bars span:nth-child(3) { height: 9px; }
.signal-bars span:nth-child(4) { height: 11px; }
.battery { width: 26px; height: 12px; border: 1.5px solid #000; border-radius: 3px; padding: 1px; position: relative; opacity: 0.8; }
.battery::after { content: ''; position: absolute; top: 3px; right: -3px; width: 2px; height: 6px; background: #000; border-radius: 0 1px 1px 0; }
.battery-fill { width: 70%; height: 100%; background: #000; border-radius: 1px; }
.dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 124px; height: 36px; background: #000; border-radius: 999px; z-index: 30; }

/* ── Nav ─ */
.merged-nav {
  position: absolute; top: 54px; left: 0; right: 0; height: 44px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 15; background: #fff;
}
.nav-left { display: flex; align-items: center; width: 100px; cursor: pointer; }
.nav-back { width: 20px; height: 20px; flex-shrink: 0; }
.nav-center {
  font-size: 17px; font-weight: 600; color: #000;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-right { display: flex; align-items: center; justify-content: flex-end; width: 100px; }
.wechat-pill { display: flex; align-items: center; background: rgba(255,255,255,0.92); border-radius: 20px; padding: 6px 4px; backdrop-filter: blur(10px); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.wechat-more { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; }
.wechat-divider { width: 1px; height: 14px; background: rgba(0,0,0,0.08); flex-shrink: 0; }
.wechat-close { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; }

/* ── Page Content ── */
.page-content {
  position: absolute; top: 98px; left: 0; right: 0; bottom: 80px;
  overflow-y: auto; overflow-x: hidden;
  background: #F7F8FA;
}

/* ── Order Card ── */
.order-card {
  margin: 12px 16px 12px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
}
.order-card-header {
  padding: 16px 16px 0;
}
.order-card-title {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a1a;
}
.order-card-body {
  padding: 0 16px 4px;
}

/* Product row */
.product-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 16px 0 12px;
}
.product-name {
  font-size: 15px;
  font-weight: 500;
  color: #333;
  line-height: 1.4;
}
.product-price {
  font-size: 28px;
  font-weight: 800;
  color: #FF6B35;
  flex-shrink: 0;
  margin-left: 12px;
  line-height: 1;
}
.product-price .yen {
  font-size: 15px;
  font-weight: 600;
}

/* Divider */
.card-divider {
  height: 1px;
  background: #F5F5F5;
}

/* Info row: label left, value right */
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  min-height: 56px;
}
.info-row + .info-row {
  border-top: 1px solid #F5F5F5;
}
.info-label {
  font-size: 15px;
  color: #333;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 72px;
}
.info-value {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

/* Phone input: WeChat Mini Program style — rounded bg + right-aligned text */
.phone-input {
  width: 200px;
  height: 36px;
  border: none;
  border-radius: 0;
  background: transparent;
  padding: 0 4px;
  font-size: 15px;
  color: #333;
  text-align: right;
  outline: none;
}
.phone-input::placeholder {
  color: #bbb;
}

/* Payment value */
.pay-value {
  display: flex;
  align-items: center;
  gap: 6px;
}
.pay-value img {
  display: block;
  width: 22px;
  height: 22px;
}
.pay-value span {
  font-size: 15px;
  color: #333;
}

/* Phone error */
.phone-error {
  font-size: 12px;
  color: #FF4D4F;
  padding: 4px 0 8px;
  display: none;
  text-align: right;
}
.phone-error.show { display: block; }

/* ── Risk Notice ── */
.risk-notice {
  margin: 0 16px 12px;
  background: #FFFEF5;
  border: 1px dashed #FFD54F;
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
  color: #FA8C16;
  line-height: 1.6;
}
.risk-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── Countdown (shown after failed payment) ── */
.countdown-bar {
  margin: 0 16px 12px;
  background: #FFF7E6;
  border-radius: 10px;
  padding: 10px 14px;
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #FA8C16;
}
.countdown-bar.show { display: flex; }
.countdown-num { font-weight: 700; font-size: 14px; }

/* ── Bottom Bar ── */
.bottom-bar {
  position: absolute; bottom: 34px; left: 0; right: 0;
  height: 64px; background: #fff; border-top: 1px solid #eee;
  display: flex; align-items: center; padding: 0 16px; z-index: 10;
}
.pay-btn {
  width: 100%;
  height: 44px;
  background: linear-gradient(135deg, #FF6B35, #FF4500);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s ease;
}
.pay-btn:active { opacity: 0.85; }
.pay-btn.disabled {
  background: #ccc;
  cursor: not-allowed;
}
.pay-btn.loading {
  cursor: not-allowed;
}

/* Spinner */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

/* ── Toast ── */
.toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  z-index: 200;
  display: none;
  text-align: center;
  max-width: 240px;
}
.toast.show { display: block; }

/* ── Home Indicator ── */
.home-indicator {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 140px; height: 5px; background: rgba(0,0,0,0.3); border-radius: 999px; z-index: 10;
}
</style>
</head>
<body>

<div class="frame">
  <div class="screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span>3:07</span>
      <div class="status-icons">
        <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="#000"/>
          <path d="M3 7.5a7 7 0 0110 0" stroke="#000" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M1 4.5a11 11 0 0114 0" stroke="#000" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>
    <div class="dynamic-island"></div>

    <!-- Nav -->
    <div class="merged-nav">
      <div class="nav-left" id="backBtn">
        <svg class="nav-back" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2">
          <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="nav-center">确认订单</div>
      <div class="nav-right">
        <div class="wechat-pill">
          <div class="wechat-more"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2" fill="#333"/><circle cx="12" cy="12" r="2" fill="#333"/><circle cx="18" cy="12" r="2" fill="#333"/></svg></div>
          <div class="wechat-divider"></div>
          <div class="wechat-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5" fill="#333" stroke="none"/></svg></div>
        </div>
      </div>
    </div>

    <!-- Page Content -->
    <div class="page-content" id="pageContent">

      <!-- Countdown (hidden by default, shown after failed payment per PRD 3.6) -->
      <div class="countdown-bar" id="countdownBar">
        <span>请在 <span class="countdown-num" id="countdownNum">4:59</span> 内完成支付，超时订单将自动取消</span>
      </div>

      <!-- Order Info Card -->
      <div class="order-card">
        <div class="order-card-header">
          <span class="order-card-title">订单信息</span>
        </div>
        <div class="order-card-body">

          <!-- Product Name + Price -->
          <div class="product-row">
            <span class="product-name">1 天免佣卡分享资格</span>
            <span class="product-price"><span class="yen">¥</span>69.99</span>
          </div>

          <div class="card-divider"></div>

          <!-- Phone Input -->
          <div class="info-row">
            <span class="info-label">接单手机号</span>
            <div class="info-value">
              <input type="tel" class="phone-input" id="phoneInput" placeholder="请输入接单手机号" maxlength="11">
            </div>
          </div>
          <div class="phone-error" id="phoneError">请输入正确的 11 位手机号码</div>

          <div class="card-divider"></div>

          <!-- Payment Method -->
          <div class="info-row" style="border-top:none; padding-bottom:16px;">
            <span class="info-label">支付方式</span>
            <div class="info-value">
              <div class="pay-value">
                <img src="../assets/支付-_微信支付-copy.svg" alt="微信支付">
                <span>微信支付</span>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Risk Notice -->
      <div class="risk-notice">
        <svg class="risk-icon" viewBox="0 0 16 16" fill="#FA8C16">
          <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 10.5a.75.75 0 110-1.5.75.75 0 010 1.5zM8.75 4.5v4a.75.75 0 01-1.5 0v-4a.75.75 0 011.5 0z"/>
        </svg>
        <span>购买后资格即时生效，分享期间请遵守平台规则。免佣卡正式生效后不支持暂停、延后、退款。</span>
      </div>

    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <button class="pay-btn disabled" id="payBtn">
        <span id="payBtnText">去支付 ¥69.99</span>
      </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>

  </div>
</div>

<script>
(function () {
  var phoneInput = document.getElementById('phoneInput');
  var phoneError = document.getElementById('phoneError');
  var payBtn = document.getElementById('payBtn');
  var payBtnText = document.getElementById('payBtnText');
  var backBtn = document.getElementById('backBtn');
  var toast = document.getElementById('toast');
  var countdownBar = document.getElementById('countdownBar');
  var countdownNum = document.getElementById('countdownNum');

  var isValidPhone = false;
  var countdownSeconds = 300;
  var countdownTimer = null;

  function validatePhone(val) {
    return /^1\d{10}$/.test(val);
  }

  function updatePayBtn() {
    var val = phoneInput.value.replace(/\D/g, '');
    phoneInput.value = val;

    if (val.length === 0) {
      phoneError.classList.remove('show');
      isValidPhone = false;
    } else if (!validatePhone(val)) {
      if (val.length === 11) {
        phoneError.classList.add('show');
      } else {
        phoneError.classList.remove('show');
      }
      isValidPhone = false;
    } else {
      phoneError.classList.remove('show');
      isValidPhone = true;
    }

    if (isValidPhone) {
      payBtn.classList.remove('disabled');
    } else {
      payBtn.classList.add('disabled');
    }
  }

  phoneInput.addEventListener('input', updatePayBtn);

  payBtn.addEventListener('click', function () {
    if (payBtn.classList.contains('loading') || payBtn.classList.contains('disabled')) return;

    if (!isValidPhone) {
      showToast('请输入正确的手机号码');
      return;
    }

    payBtn.classList.add('loading');
    payBtnText.innerHTML = '<div class="spinner"></div>';

    setTimeout(function () {
      window.location.href = '06-purchase-success.html';
    }, 1500);
  });

  backBtn.addEventListener('click', function () {
    window.location.href = 'index.html';
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function () {
      toast.classList.remove('show');
    }, 2000);
  }

  function startCountdown() {
    countdownBar.classList.add('show');
    countdownSeconds = 300;
    countdownTimer = setInterval(function () {
      countdownSeconds--;
      var min = Math.floor(countdownSeconds / 60);
      var sec = countdownSeconds % 60;
      countdownNum.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
      if (countdownSeconds <= 0) {
        clearInterval(countdownTimer);
        payBtn.classList.add('disabled');
        showToast('订单已取消，请重新下单');
      }
    }, 1000);
  }

  // Uncomment to test countdown:
  // startCountdown();
})();
</script>

</body>
</html>
